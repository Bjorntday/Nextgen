<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D0D0F" />
  <link rel="icon" href="/assets/image.png" />
  <title>登录 - NextGen Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F5F5F7;
  color: #1D1D1F;
  min-height: 100vh;
  display:flex; align-items:center; justify-content:center;
  -webkit-font-smoothing: antialiased;
}
/* Sidebar */
.sidebar {
  position:fixed; left:0; top:0; bottom:0; width:64px;
  background:#FFFFFF; border-right:1px solid rgba(0,0,0,0.06);
  display:flex; flex-direction:column; align-items:center; padding:16px 10px;
  z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.sidebar-logo { width:30px; height:30px; border-radius:6px; margin-bottom:16px; }
.nav-item {
  display:flex; align-items:center; justify-content:center; width:44px; height:44px;
  border-radius:10px; color:#99999D; cursor:pointer; text-decoration:none;
  transition:all 0.15s; margin-bottom:4px;
}
.nav-item:hover { background:rgba(0,122,255,0.06); color:#007AFF; }
.nav-item.active { background:rgba(0,122,255,0.08); color:#007AFF; }

.login-bg {
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,122,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.03) 0%, transparent 50%);
  pointer-events:none;
}

.login-card {
  width: 380px;
  padding: 40px 36px;
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  display:flex; flex-direction:column; gap:20px;
  position:relative; z-index:1;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}

.card-header { text-align:center; display:flex; flex-direction:column; gap:8px; }
.card-header img { width:48px; height:48px; margin:0 auto; border-radius:12px; }
.card-header h1 { font-size:18px; font-weight:700; color:#1D1D1F; letter-spacing:0.5px; }
.card-header p { font-size:13px; color:#6E6E73; }

/* Login method tabs */
.login-tabs {
  display:flex; background:#F5F5F7; border-radius:8px;
  padding:3px; gap:3px; border:1px solid rgba(0,0,0,0.06);
}
.login-tab {
  flex:1; padding:8px; background:transparent; border:none; border-radius:6px;
  color:#99999D; font-size:12px; cursor:pointer; transition:all 0.15s; font-weight:500;
}
.login-tab:hover { color:#6E6E73; }
.login-tab.active { background:#FFFFFF; color:#007AFF; font-weight:600; box-shadow:0 1px 2px rgba(0,0,0,0.06); }

.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:12px; color:#6E6E73; font-weight:500; }
.field input {
  padding:11px 14px;
  background: #F5F5F7;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius:8px;
  color:#1D1D1F;
  font-size:14px;
  font-family:inherit;
  transition:all 0.15s;
}
.field input:focus {
  outline:none;
  border-color:#007AFF;
  box-shadow:0 0 0 3px rgba(0,122,255,0.12);
}
.field input::placeholder { color:#99999D; }

.sms-row { display:flex; gap:8px; }
.sms-row input { flex:1; }
.btn-sms {
  padding:11px 14px; background:rgba(0,122,255,0.08); border:1px solid rgba(0,122,255,0.2);
  border-radius:8px; color:#007AFF; font-size:13px; font-weight:500; white-space:nowrap;
  cursor:pointer; transition:all 0.15s;
}
.btn-sms:hover { background:rgba(0,122,255,0.15); }
.btn-sms:disabled { opacity:0.5; cursor:not-allowed; }

.btn-login {
  width:100%; padding:12px;
  background: #007AFF;
  border:none; border-radius:8px; color:#fff;
  font-size:14px; font-weight:600; cursor:pointer;
  transition:all 0.15s; box-shadow:0 4px 16px rgba(0,122,255,0.3);
}
.btn-login:hover { box-shadow:0 6px 24px rgba(0,122,255,0.4); transform:translateY(-1px); background:#0055CC; }
.btn-login:active { transform:translateY(0); }
.btn-login:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.forgot-link { font-size:11px; color:#99999D; text-align:right; text-decoration:none; display:none; }
.forgot-link:hover { color:#007AFF; }
.forgot-link.show { display:block; }

.divider {
  display:flex; align-items:center; gap:12px;
  color:#99999D; font-size:12px;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px; background:rgba(0,0,0,0.06);
}

.social-btns { display:flex; gap:10px; }
.btn-social {
  flex:1; padding:10px;
  background:#F5F5F7;
  border:1px solid rgba(0,0,0,0.06);
  border-radius:8px; color:#6E6E73;
  font-size:12px; font-weight:500; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.15s;
}
.btn-social:hover { background:#EAEAED; color:#1D1D1F; }

.footer-links { text-align:center; font-size:11px; color:#99999D; }
.footer-links a { color:#6E6E73; text-decoration:none; }
.footer-links a:hover { color:#007AFF; }
.footer-links span { margin:0 4px; }

.back-link {
  text-align:center; font-size:12px; color:#99999D; text-decoration:none;
  padding:8px; transition:color 0.15s;
}
.back-link:hover { color:#6E6E73; }

#smsPanel, #pwdPanel { display:none; }
#smsPanel.show, #pwdPanel.show { display:flex; flex-direction:column; gap:12px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#007AFF; color:#fff; padding:10px 24px; border-radius:20px; font-size:13px; font-weight:600; z-index:1000; animation:toastIn 0.3s ease, toastOut 0.3s ease 2s forwards; }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }
</style>
</head>
<body>
<div class="login-bg"></div>

<!-- Sidebar -->
<aside class="sidebar">
  <a href="/pages/index.html"><img class="sidebar-logo" src="/assets/image.png" alt="NextGen" /></a>
  <a href="/pages/index.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8h20M2 16h20"/><circle cx="8" cy="12" r="2" fill="currentColor" stroke="none"/></svg>
  </a>
  <a href="/pages/distribute.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
  </a>
  <a href="/pages/image-editor.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><path d="M21 15l-5-5L5 21"/></svg>
  </a>
  <a href="/pages/settings.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </a>
</aside>

<div class="login-card" style="margin-left:32px;">
  <div class="card-header">
    <img src="/assets/image.png" alt="NextGen" />
    <h1>NEXTGEN</h1>
    <p>AI 电商内容创作平台</p>
  </div>

  <div class="login-tabs">
    <button class="login-tab active" id="tabSms" onclick="switchTab('sms')">手机验证码</button>
    <button class="login-tab" id="tabPwd" onclick="switchTab('pwd')">密码登录</button>
  </div>

  <!-- SMS Panel -->
  <div id="smsPanel" class="show">
    <div class="field">
      <label>手机号</label>
      <input type="tel" id="phoneInputSms" placeholder="输入手机号" maxlength="11" />
    </div>
    <div class="field">
      <label>验证码</label>
      <div class="sms-row">
        <input type="text" id="codeInputSms" placeholder="输入验证码" maxlength="6" />
        <button class="btn-sms" id="smsBtn" onclick="sendSMS()">获取验证码</button>
      </div>
    </div>
    <button class="btn-login" id="loginBtnSms" onclick="handleLogin('sms')">登录</button>
  </div>

  <!-- Password Panel -->
  <div id="pwdPanel">
    <div class="field">
      <label>手机号</label>
      <input type="tel" id="phoneInputPwd" placeholder="输入手机号" maxlength="11" />
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="pwdInput" placeholder="输入密码" />
    </div>
    <a href="#" class="forgot-link show" title="暂未上线">忘记密码？</a>
    <button class="btn-login" id="loginBtnPwd" onclick="handleLogin('pwd')">登录</button>
  </div>

  <div class="divider">或使用以下方式</div>

  <div class="social-btns">
    <button class="btn-social" onclick="socialLogin('微信')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      微信登录
    </button>
    <button class="btn-social" onclick="socialLogin('短信')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      短信登录
    </button>
  </div>

  <div class="footer-links">
    <a href="#" title="暂未上线">用户协议</a><span>·</span><a href="#" title="暂未上线">隐私政策</a>
  </div>

  <a href="/pages/index.html" class="back-link">← 返回首页</a>
</div>

<script>
let smsTimer = null;
let smsCountdown = 0;

function switchTab(tab) {
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + (tab === 'sms' ? 'Sms' : 'Pwd')).classList.add('active');
  document.getElementById('smsPanel').classList.toggle('show', tab === 'sms');
  document.getElementById('pwdPanel').classList.toggle('show', tab === 'pwd');
  document.querySelector('.forgot-link').classList.toggle('show', tab === 'pwd');
}

function sendSMS() {
  const phone = document.getElementById('phoneInputSms').value.trim();
  if (!phone || phone.length < 11) { showToast('请输入有效的手机号'); return; }
  if (smsCountdown > 0) return;
  smsCountdown = 60;
  const btn = document.getElementById('smsBtn');
  btn.disabled = true;
  btn.textContent = smsCountdown + 's';
  smsTimer = setInterval(() => {
    smsCountdown--;
    if (smsCountdown <= 0) { clearInterval(smsTimer); btn.disabled = false; btn.textContent = '获取验证码'; }
    else { btn.textContent = smsCountdown + 's'; }
  }, 1000);
  showToast('验证码已发送');
}

function handleLogin(method) {
  let phone, code;
  if (method === 'sms') {
    phone = document.getElementById('phoneInputSms').value.trim();
    code = document.getElementById('codeInputSms').value.trim();
    if (!phone) { showToast('请输入手机号'); return; }
    if (!code) { showToast('请输入验证码'); return; }
  } else {
    phone = document.getElementById('phoneInputPwd').value.trim();
    code = document.getElementById('pwdInput').value;
    if (!phone) { showToast('请输入手机号'); return; }
    if (!code) { showToast('请输入密码'); return; }
  }

  const btn = document.querySelector('.btn-login:not([disabled])');
  if (btn) { btn.disabled = true; btn.textContent = '登录中...'; }

  setTimeout(() => {
    localStorage.setItem('shoplive_token', 'logged_in');
    localStorage.setItem('shoplive_user', phone);
    showToast('登录成功');

    // Navigate back to referrer if available
    const ref = document.referrer;
    setTimeout(() => {
      if (ref && ref.indexOf('/pages/index.html') > -1) location.href = ref;
      else location.href = '/pages/index.html';
    }, 800);
  }, 1000);
}

function socialLogin(name) {
  showToast(name + ' 快捷登录');
  // Fill phone only from SMS panel (don't auto-fill for password panel)
  if (document.getElementById('smsPanel').classList.contains('show')) {
    document.getElementById('phoneInputSms').value = '';
  }
  // Just show we're trying - no auto-fill of fake data
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// Init
switchTab('sms');
</script>
</body>
</html>
