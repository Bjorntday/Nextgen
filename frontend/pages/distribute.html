<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#F5F5F7" />
<link rel="icon" href="/assets/image.png" />
<title>智能分发 - NextGen Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #F5F5F7; --card: #FFFFFF; --primary: #007AFF; --primary-hover: #0055CC;
  --text: #1D1D1F; --text2: #6E6E73; --text3: #99999D;
  --border: rgba(0,0,0,0.06); --muted: #F9F9FB; --elevated: #EAEAED;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* Sidebar */
.sidebar { position:fixed; left:0; top:0; bottom:0; width:64px; background:#FFFFFF; border-right:1px solid rgba(0,0,0,0.06); display:flex; flex-direction:column; align-items:center; padding:16px 10px; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.nav-item { display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:10px; color:#99999D; cursor:pointer; text-decoration:none; position:relative; transition:all 0.15s; margin-bottom:4px; }
.nav-item:hover { background:rgba(0,122,255,0.06); color:#007AFF; }
.nav-item.active { background:rgba(0,122,255,0.08); color:#007AFF; }
.sidebar-logo { width:30px; height:30px; border-radius:6px; margin-bottom:16px; }
.nav-item svg { width:20px; height:20px; }
.nav-tooltip { position:absolute; left:54px; top:50%; transform:translateY(-50%); background:#1D1D1F; color:#fff; font-size:11px; padding:4px 10px; border-radius:6px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.15s; }
.nav-item:hover .nav-tooltip { opacity:1; }

/* Page */
.page { display:flex; flex-direction:column; height:100vh; margin-left:64px; }
.header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:#FFFFFF; border-bottom:1px solid var(--border); }
.brand { display:flex; align-items:center; gap:10px; }
.brand img { width:28px; height:28px; border-radius:6px; }
.brand strong { font-size:14px; color:var(--primary); }
.header-title { font-size:16px; font-weight:700; }
.btn-back { color:var(--text2); text-decoration:none; font-size:12px; padding:6px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); transition:all 0.15s; }
.btn-back:hover { border-color:var(--primary); color:var(--primary); }
.body { flex:1; display:flex; overflow:hidden; }
.panel { padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
.panel-left { width:280px; border-right:1px solid var(--border); }
.panel-mid { width:260px; border-right:1px solid var(--border); }
.panel-right { flex:1; }
.panel-title { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px; font-weight:600; }

/* Content grid */
.content-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.content-item { position:relative; border-radius:var(--radius-sm); overflow:hidden; cursor:pointer; border:2px solid transparent; transition:all 0.15s; aspect-ratio:1; background:var(--muted); }
.content-item img { width:100%; height:100%; object-fit:cover; display:block; }
.content-item.selected { border-color:var(--primary); box-shadow:0 0 12px rgba(0,122,255,0.15); }
.content-item .check { position:absolute; top:5px; right:5px; width:18px; height:18px; border-radius:50%; background:rgba(255,255,255,0.9); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.content-item.selected .check { background:var(--primary); border-color:var(--primary); }
.content-item.selected .check::after { content:'✓'; color:#fff; font-size:10px; font-weight:700; }
.content-item .label { position:absolute; bottom:0; left:0; right:0; padding:4px 6px; background:linear-gradient(transparent, rgba(0,0,0,0.7)); font-size:9px; color:#fff; }

/* Platform cards */
.platform-cards { display:flex; flex-direction:column; gap:5px; }
.platform-card { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:all 0.15s; }
.platform-card:hover { border-color:rgba(0,0,0,0.12); }
.platform-card.selected { border-color:var(--border); }
.platform-card .dot { width:18px; height:18px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.platform-card.selected .dot::after { content:'✓'; color:#fff; font-size:9px; font-weight:700; }
.platform-card .name { font-size:12px; font-weight:500; }
.platform-card .pinfo { font-size:10px; color:var(--text3); margin-left:auto; }
.platform-card.xhs { border-left:3px solid #FF2442; } .platform-card.xhs.selected .dot { background:#FF2442; border-color:#FF2442; }
.platform-card.dy { border-left:3px solid #000; } .platform-card.dy.selected .dot { background:#000; border-color:#000; }
.platform-card.ks { border-left:3px solid #FF4906; } .platform-card.ks.selected .dot { background:#FF4906; border-color:#FF4906; }
.platform-card.sph { border-left:3px solid #07C160; } .platform-card.sph.selected .dot { background:#07C160; border-color:#07C160; }
.platform-card.tb { border-left:3px solid #FF5000; } .platform-card.tb.selected .dot { background:#FF5000; border-color:#FF5000; }
.platform-card.jd { border-left:3px solid #E2231A; } .platform-card.jd.selected .dot { background:#E2231A; border-color:#E2231A; }
.more-platforms { display:none; }
.more-platforms.show { display:flex; flex-direction:column; gap:5px; }
.btn-more { padding:6px 12px; background:var(--muted); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text3); font-size:11px; cursor:pointer; text-align:center; transition:all 0.15s; }
.btn-more:hover { border-color:var(--primary); color:var(--primary); }

/* Platform inputs */
.platform-inputs { display:flex; flex-direction:column; gap:8px; max-height:360px; overflow-y:auto; }
.platform-input-group { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; }
.platform-input-group h4 { font-size:12px; color:var(--text); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.platform-input-group h4 .pdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.platform-input-group label { font-size:10px; color:var(--text3); display:block; margin:5px 0 3px; text-transform:uppercase; letter-spacing:0.5px; }
.platform-input-group input, .platform-input-group textarea { width:100%; padding:7px 10px; background:var(--muted); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:12px; font-family:inherit; }
.platform-input-group input:focus, .platform-input-group textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2px rgba(0,122,255,0.08); }
.platform-input-group textarea { resize:vertical; min-height:44px; line-height:1.5; }
.char-count { font-size:10px; color:var(--text3); text-align:right; margin-top:2px; }

/* Tags */
.tag-section { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.tag-section input { flex:1; min-width:100px; padding:6px 10px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:11px; }
.tag-suggestions { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
.tag-suggestion { font-size:10px; padding:2px 7px; background:var(--muted); border:1px solid var(--border); border-radius:8px; color:var(--text3); cursor:pointer; transition:all 0.15s; }
.tag-suggestion:hover { border-color:var(--primary); color:var(--primary); }
.tag-chip { display:flex; align-items:center; gap:3px; padding:3px 7px; background:rgba(0,122,255,0.08); border-radius:10px; font-size:10px; color:var(--primary); }
.tag-chip button { background:none; border:none; color:var(--text3); cursor:pointer; font-size:11px; line-height:1; }

/* AI copy button */
.btn-ai-copy { width:100%; padding:9px 14px; background:linear-gradient(135deg, #007AFF, #5856D6); border:none; border-radius:var(--radius-sm); color:#fff; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; box-shadow:0 2px 10px rgba(0,122,255,0.2); transition:all 0.15s; }
.btn-ai-copy:hover { box-shadow:0 4px 16px rgba(0,122,255,0.3); transform:translateY(-1px); }
.btn-ai-copy:disabled { opacity:0.5; }

/* Preview */
.preview-area { display:flex; flex-direction:column; gap:10px; }
.preview-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; min-height:140px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text3); font-size:12px; gap:8px; }
.preview-card { background:var(--card); border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); margin-bottom:10px; }
.preview-card.xhs { border:1px solid #FF2442; border-left:4px solid #FF2442; }
.preview-card.dy { background:#000; color:#fff; border-radius:var(--radius-md); }
.preview-card.ks { border:1px solid #FF4906; border-left:4px solid #FF4906; }
.preview-card.tb, .preview-card.jd { border:1px solid var(--border); }
.preview-card .pc-img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--muted); }
.preview-card .pc-body { padding:10px; }
.preview-card .pc-title { font-size:12px; font-weight:600; line-height:1.4; }
.preview-card .pc-desc { font-size:11px; color:var(--text3); margin-top:4px; line-height:1.5; }
.preview-card .pc-tags { font-size:10px; color:var(--primary); margin-top:6px; }
.preview-card .pc-actions { display:flex; gap:10px; margin-top:8px; font-size:10px; color:var(--text3); }
.preview-card.dy .pc-actions, .preview-card.dy .pc-desc { color:rgba(255,255,255,0.5); }

/* Schedule toggle */
.schedule-row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.schedule-row input { padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:11px; background:var(--card); }
.toggle { position:relative; display:inline-block; width:40px; height:22px; }
.toggle input { display:none; }
.toggle .slider { position:absolute; inset:0; background:#ddd; border-radius:11px; cursor:pointer; transition:0.15s; }
.toggle input:checked + .slider { background:var(--primary); }
.toggle .slider::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; left:2px; bottom:2px; transition:0.15s; }
.toggle input:checked + .slider::after { transform:translateX(18px); }

/* Bottom bar */
.bottom-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:#FFFFFF; border-top:1px solid var(--border); }
.bottom-info { font-size:11px; color:var(--text3); display:flex; gap:16px; }
.btn-publish { padding:10px 28px; background:var(--primary); border:none; border-radius:var(--radius-md); color:#fff; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; box-shadow:0 2px 10px rgba(0,122,255,0.2); transition:all 0.15s; }
.btn-publish:hover { background:var(--primary-hover); box-shadow:0 4px 16px rgba(0,122,255,0.3); }
.btn-publish:disabled { opacity:0.5; cursor:not-allowed; }

/* AI Modal */
.ai-modal { position:fixed; inset:0; background:rgba(0,0,0,0.2); z-index:1000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.ai-modal.show { display:flex; }
.ai-modal-card { background:#FFFFFF; border-radius:16px; padding:24px; width:440px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.12); display:flex; flex-direction:column; gap:14px; }
.ai-modal-card h3 { font-size:16px; font-weight:700; }
.ai-modal-card .field { display:flex; flex-direction:column; gap:4px; }
.ai-modal-card .field label { font-size:11px; color:var(--text2); }
.ai-modal-card .field input, .ai-modal-card .field textarea, .ai-modal-card .field select { padding:8px 12px; background:var(--muted); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:12px; font-family:inherit; }
.ai-modal-card .field textarea { resize:vertical; min-height:60px; }
.ai-platform-list { font-size:11px; color:var(--text2); }
.btn { padding:8px 16px; border:none; border-radius:var(--radius-sm); font-size:12px; font-weight:600; cursor:pointer; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-secondary { background:var(--muted); color:var(--text2); border:1px solid var(--border); }
.btn-sm { padding:6px 14px; font-size:11px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--primary); color:#fff; padding:10px 24px; border-radius:20px; font-size:13px; font-weight:600; z-index:1000; animation:toastIn 0.3s, toastOut 0.3s 2s forwards; }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity:0; } }
.empty-hint { font-size:11px; color:var(--text3); text-align:center; padding:20px; line-height:1.8; }
.empty-hint a { color:var(--primary); text-decoration:none; font-weight:500; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <a href="/pages/index.html"><img class="sidebar-logo" src="/assets/image.png" /></a>
  <a href="/pages/index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8h20M2 16h20"/><circle cx="8" cy="12" r="2" fill="currentColor" stroke="none"/></svg><span class="nav-tooltip">创意工坊</span></a>
  <a href="#" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span class="nav-tooltip">智能分发</span></a>
  <a href="/pages/image-editor.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><path d="M21 15l-5-5L5 21"/></svg><span class="nav-tooltip">素材编辑</span></a>
  <a href="/pages/settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span class="nav-tooltip">设置</span></a>
</aside>

<!-- Page -->
<main class="page">
  <header class="header">
    <div class="brand"><img src="/assets/image.png" /><strong>NEXTGEN</strong></div>
    <span class="header-title">智能分发</span>
    <a href="/pages/index.html" class="btn-back">← 返回首页</a>
  </header>

  <section class="body">
    <!-- Left: Content -->
    <div class="panel panel-left">
      <span class="panel-title">选择内容</span>
      <div class="content-grid" id="contentGrid"></div>
    </div>

    <!-- Mid: Platforms -->
    <div class="panel panel-mid">
      <span class="panel-title">发布平台</span>
      <div class="platform-cards" id="platformCards">
        <div class="platform-card xhs" data-platform="xhs"><div class="dot"></div><span class="name">小红书</span><span class="pinfo">笔记</span></div>
        <div class="platform-card dy" data-platform="dy"><div class="dot"></div><span class="name">抖音</span><span class="pinfo">短视频</span></div>
        <div class="platform-card ks" data-platform="ks"><div class="dot"></div><span class="name">快手</span><span class="pinfo">短视频</span></div>
      </div>
      <button class="btn-more" id="btnMore" onclick="toggleMorePlatforms()">查看全部 6 个平台 ▼</button>
      <div class="more-platforms" id="morePlatforms">
        <div class="platform-card sph" data-platform="sph"><div class="dot"></div><span class="name">视频号</span><span class="pinfo">短视频</span></div>
        <div class="platform-card tb" data-platform="tb"><div class="dot"></div><span class="name">淘宝</span><span class="pinfo">图文</span></div>
        <div class="platform-card jd" data-platform="jd"><div class="dot"></div><span class="name">京东</span><span class="pinfo">图文</span></div>
      </div>
    </div>

    <!-- Right: Settings -->
    <div class="panel panel-right">
      <span class="panel-title">发布设置</span>
      <button class="btn-ai-copy" onclick="openAiModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> AI 生成文案
      </button>
      <div class="tag-section">
        <span style="font-size:11px;color:var(--text3);">标签</span>
        <input type="text" id="globalTagInput" placeholder="# 回车添加标签" />
      </div>
      <div class="tag-suggestions" id="tagSuggestions"></div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;" id="globalTagList"></div>
      <div class="platform-inputs" id="platformInputs"></div>
      <div class="schedule-row">
        <label class="toggle"><input type="checkbox" id="scheduleToggle" onchange="toggleSchedule()"><span class="slider"></span></label>
        <span style="font-size:11px;color:var(--text2);">定时发布</span>
        <input type="datetime-local" id="scheduleTime" style="display:none;" />
      </div>
      <span class="panel-title" style="margin-top:4px;">发布预览</span>
      <div class="preview-box" id="previewBox">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>选择内容和平台后可预览</span>
      </div>
      <div id="previewPlatforms"></div>
    </div>
  </section>

  <footer class="bottom-bar">
    <div class="bottom-info">
      <span id="selectedInfo">未选择内容</span>
      <span id="platformInfo">未选择平台</span>
    </div>
    <button class="btn-publish" id="publishBtn" disabled onclick="handlePublish()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg> 一键发布
    </button>
  </footer>
</main>

<!-- AI Modal -->
<div class="ai-modal" id="aiModal">
  <div class="ai-modal-card">
    <h3>AI 文案生成</h3>
    <p style="font-size:12px;color:var(--text3);">输入商品信息，AI 为每个平台生成适配文案</p>
    <div class="field"><label>商品名称</label><input type="text" id="aiProductName" placeholder="例：黑科技透气跑鞋" /></div>
    <div class="field"><label>核心卖点</label><textarea id="aiSellingPoints" placeholder="透气网面 · 缓震鞋底 · 轻量设计" rows="2"></textarea></div>
    <div class="field"><label>文案风格</label><select id="aiTone"><option value="种草">种草风</option><option value="促销">促销风</option><option value="测评">专业测评</option></select></div>
    <div class="ai-platform-list" id="aiPlatformList"></div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button class="btn btn-secondary btn-sm" onclick="closeAiModal()">取消</button>
      <button class="btn btn-primary btn-sm" id="aiBtn" onclick="generateAiCopy()">生成文案</button>
    </div>
  </div>
</div>

<script>
const PLATFORM_META = {
  xhs: { name:'小红书', dotColor:'#FF2442', titleMax:20, bodyMax:1000, tags:false, body:true, label:'笔记标题' },
  dy: { name:'抖音', dotColor:'#000', titleMax:55, bodyMax:0, tags:true, body:false, label:'视频标题' },
  ks: { name:'快手', dotColor:'#FF4906', titleMax:55, bodyMax:0, tags:true, body:false, label:'视频标题' },
  sph: { name:'视频号', dotColor:'#07C160', titleMax:55, bodyMax:0, tags:true, body:false, label:'视频标题' },
  tb: { name:'淘宝', dotColor:'#FF5000', titleMax:30, bodyMax:500, tags:false, body:true, label:'商品标题' },
  jd: { name:'京东', dotColor:'#E2231A', titleMax:30, bodyMax:500, tags:false, body:true, label:'商品标题' },
};
const TAG_PRESETS = ['618大促','新品首发','好物推荐','种草','必买清单','开箱测评','好物分享','小红书爆款','抖音同款'];
let selectedPlatforms = new Set();
let selectedContent = [];
let globalTags = [];

// ── Content ──
function loadContent() {
  const grid = document.getElementById('contentGrid');
  let assets = [];
  try { assets = JSON.parse(localStorage.getItem('nextgen_assets')||'[]'); } catch(e) {}
  if (assets.length === 0) {
    // fallback
    const hist = JSON.parse(localStorage.getItem('nextgen_history')||'[]');
    assets = hist.map((h,i) => ({ type:'image', url:h.url, prompt:h.prompt, time:h.time, id:'h'+i }));
  }
  if (assets.length) {
    grid.innerHTML = '';
    assets.slice(0,20).forEach((a,i) => {
      const d = document.createElement('div');
      d.className = 'content-item' + (a.type==='video'?' video-item':'');
      d.dataset.id = 'c'+i;
      d.innerHTML = '<img src="'+a.url+'"><div class="check"></div><div class="label">'+(a.prompt||'').substring(0,20)+(a.type==='video'?' 🎬':'')+'</div>';
      d.onclick = () => { d.classList.toggle('selected'); cacheContent(); updateStatus(); };
      grid.appendChild(d);
    });
    return;
  }
  grid.innerHTML = '<div class="empty-hint">暂无内容<br><a href="/pages/image-editor.html">前往素材编辑生成图片 →</a></div>';
}

function cacheContent() {
  selectedContent = [];
  document.querySelectorAll('.content-item.selected').forEach(el => {
    const img = el.querySelector('img');
    selectedContent.push({ id:el.dataset.id, url:img?img.src:'', label:el.querySelector('.label')?.textContent||'' });
  });
}

// ── Platforms ──
function toggleMorePlatforms() {
  const m = document.getElementById('morePlatforms');
  const b = document.getElementById('btnMore');
  m.classList.toggle('show');
  b.textContent = m.classList.contains('show') ? '收起 ▲' : '查看全部 6 个平台 ▼';
}

function bindPlatforms() {
  document.querySelectorAll('.platform-card').forEach(c => {
    c.onclick = () => {
      c.classList.toggle('selected');
      const p = c.dataset.platform;
      if (c.classList.contains('selected')) selectedPlatforms.add(p);
      else selectedPlatforms.delete(p);
      renderPlatformInputs(); updateStatus();
      if (p==='sph'||p==='tb'||p==='jd') toggleMorePlatforms();
    };
  });
}

// ── Platform Inputs ──
function renderPlatformInputs() {
  const c = document.getElementById('platformInputs');
  c.innerHTML = '';
  [...selectedPlatforms].forEach(pid => {
    const m = PLATFORM_META[pid];
    const g = document.createElement('div'); g.className='platform-input-group';
    g.innerHTML = '<h4><span class="pdot" style="background:'+m.dotColor+'"></span>'+m.name+'</h4>'
      + '<label>'+m.label+' ('+m.titleMax+'字)</label>'
      + '<input type="text" data-p="'+pid+'" data-f="title" maxlength="'+m.titleMax+'" placeholder="输入'+m.label+'" />'
      + '<div class="char-count" data-p="'+pid+'" data-f="title">0/'+m.titleMax+'</div>'
      + (m.body ? '<label>正文 ('+m.bodyMax+'字)</label><textarea data-p="'+pid+'" data-f="body" maxlength="'+m.bodyMax+'" rows="3" placeholder="输入正文..."></textarea>' : '')
      + (m.tags ? '<label>话题标签</label><input type="text" data-p="'+pid+'" data-f="tags" placeholder="#话题1 #话题2" />' : '');
    c.appendChild(g);
  });
  c.querySelectorAll('input,textarea').forEach(el => { el.oninput = updatePreview; });
}

// ── Tags ──
const tagInput = document.getElementById('globalTagInput');
const sug = document.getElementById('tagSuggestions');
function renderSugs(f) {
  sug.innerHTML = (f ? TAG_PRESETS.filter(t=>t.includes(f)) : TAG_PRESETS).map(t=>'<span class="tag-suggestion">#'+t+'</span>').join('');
  sug.querySelectorAll('.tag-suggestion').forEach(el=>{ el.onclick = ()=>{ addTag(el.textContent.replace('#','')); }; });
}
renderSugs('');
tagInput.oninput = () => { const v=tagInput.value; renderSugs(v.startsWith('#')?v.slice(1):''); };
tagInput.onkeydown = e => { if(e.key==='Enter'&&tagInput.value.trim()){ e.preventDefault(); addTag(tagInput.value.trim().replace(/^#/,'')); tagInput.value=''; renderSugs(''); }};
function addTag(t){ if(t&&!globalTags.includes(t)){globalTags.push(t);renderTags();} }
function renderTags() {
  const l = document.getElementById('globalTagList');
  l.innerHTML = globalTags.map(t=>'<span class="tag-chip">#'+t+'<button onclick="removeTag(\''+t+'\')">&times;</button></span>').join('');
}
function removeTag(t){ globalTags=globalTags.filter(x=>x!==t); renderTags(); }

// ── Schedule ──
function toggleSchedule() {
  document.getElementById('scheduleTime').style.display = document.getElementById('scheduleToggle').checked ? '' : 'none';
}

// ── Status ──
function updateStatus() {
  const hc = selectedContent.length > 0, hp = selectedPlatforms.size > 0;
  document.getElementById('selectedInfo').textContent = hc ? '已选 '+selectedContent.length+' 项' : '未选择内容';
  document.getElementById('platformInfo').textContent = hp ? '已选 '+selectedPlatforms.size+' 个平台' : '未选择平台';
  document.getElementById('publishBtn').disabled = !(hc && hp);
  updatePreview();
}

function updatePreview() {
  const pb = document.getElementById('previewBox');
  const pp = document.getElementById('previewPlatforms');
  if (selectedContent.length === 0 || selectedPlatforms.size === 0) { pb.style.display=''; pp.innerHTML=''; return; }
  pb.style.display = 'none';
  pp.innerHTML = '';
  const img = selectedContent[0];
  [...selectedPlatforms].forEach(pid => {
    const m = PLATFORM_META[pid];
    const t = (document.querySelector('[data-p="'+pid+'"][data-f="title"]')||{}).value || '';
    const b = (document.querySelector('[data-p="'+pid+'"][data-f="body"]')||{}).value || '';
    const tags = ((document.querySelector('[data-p="'+pid+'"][data-f="tags"]')||{}).value || '').split(/[#\s]+/).filter(Boolean);
    const d = document.createElement('div'); d.className='preview-card '+pid;

    if (pid==='dy') {
      d.innerHTML = '<img class="pc-img" src="'+(img.url||'')+'" />'
        + '<div class="pc-body"><div class="pc-title">'+(t||'(未填)')+'</div>'
        + (tags.length?'<div class="pc-tags">#'+tags.join(' #')+'</div>':'')
        + '<div class="pc-actions">❤ 0 · 💬 0 · ↗ 分享</div></div>';
    } else {
      d.innerHTML = '<div class="pc-body"><div class="pc-title">'+(t||'(未填)')+'</div>'
        + (b?'<div class="pc-desc">'+b.substring(0,120)+(b.length>120?'...':'')+'</div>':'')
        + (tags.length?'<div class="pc-tags">#'+tags.join(' #')+'</div>':'')
        + (globalTags.length?'<div class="pc-tags" style="margin-top:2px;">全局: #'+globalTags.join(' #')+'</div>':'')
        + '<div class="pc-actions">'+(pid==='xhs'?'❤ 0 · 💬 0 · ⭐ 收藏':pid==='ks'?'👍 0 · 💬 0 · ↗ 分享':pid==='tb'||pid==='jd'?'⭐ 收藏 · 🛒 购买':'')+'</div></div>';
      if (img.url) d.innerHTML = '<img class="pc-img" src="'+img.url+'" />' + d.innerHTML;
    }
    pp.appendChild(d);
  });
}

// ── Publish ──
function handlePublish() {
  if (!selectedContent.length || !selectedPlatforms.size) return;
  const btn = document.getElementById('publishBtn');
  btn.disabled = true; btn.textContent = '发布中...';

  // Save schedule if set
  if (document.getElementById('scheduleToggle').checked) {
    const t = document.getElementById('scheduleTime').value;
    if (t) {
      const s = JSON.parse(localStorage.getItem('nextgen_schedules')||'[]');
      s.push({ time:t, platforms:[...selectedPlatforms], content:selectedContent.length, createdAt:new Date().toISOString() });
      localStorage.setItem('nextgen_schedules', JSON.stringify(s));
    }
  }

  setTimeout(() => {
    const names = [...selectedPlatforms].map(p=>PLATFORM_META[p].name).join('、');
    const sched = document.getElementById('scheduleToggle').checked;
    toast(sched ? '已加入定时发布计划' : '已发布到 '+names);

    // Clear selections
    document.querySelectorAll('.platform-card.selected').forEach(c=>c.classList.remove('selected'));
    document.querySelectorAll('.content-item.selected').forEach(c=>c.classList.remove('selected'));
    selectedPlatforms.clear();
    selectedContent = [];
    document.getElementById('platformInputs').innerHTML = '';
    document.getElementById('previewPlatforms').innerHTML = '';
    document.getElementById('previewBox').style.display = '';
    document.getElementById('scheduleToggle').checked = false;
    document.getElementById('scheduleTime').style.display = 'none';
    document.getElementById('scheduleTime').value = '';
    globalTags = []; renderTags();

    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg> 一键发布';
    updateStatus();
  }, 1500);
}

// ── AI Copy ──
function openAiModal() {
  if (!selectedPlatforms.size) { toast('请先选择发布平台'); return; }
  const cfg = JSON.parse(localStorage.getItem('nextgen_api_config')||'{}');
  if (!(cfg.defaults&&cfg.defaults.llm) && !Object.keys(cfg.llm||{}).length) { toast('请先在设置中配置AI模型'); return; }
  document.getElementById('aiPlatformList').innerHTML = [...selectedPlatforms].map(p=>{
    const m=PLATFORM_META[p];
    return '<span style="display:inline-block;margin:2px 6px 2px 0;padding:2px 8px;background:var(--muted);border-radius:6px;font-size:11px;"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+m.dotColor+';margin-right:4px;"></span>'+m.name+'</span>';
  }).join('');
  // Auto-fill product name from first content label
  if (selectedContent.length && !document.getElementById('aiProductName').value) {
    document.getElementById('aiProductName').value = selectedContent[0].label || '';
  }
  document.getElementById('aiModal').classList.add('show');
}
function closeAiModal() { document.getElementById('aiModal').classList.remove('show'); }

function generateAiCopy() {
  const name = document.getElementById('aiProductName').value.trim();
  if (!name) { toast('请输入商品名称'); return; }
  const points = document.getElementById('aiSellingPoints').value.trim();
  const tone = document.getElementById('aiTone').value;
  const btn = document.getElementById('aiBtn'); btn.disabled = true; btn.textContent = '生成中...';

  setTimeout(() => {
    [...selectedPlatforms].forEach(pid => {
      const m = PLATFORM_META[pid];
      const { title, body, tags } = mockCopy(pid, m, name, points, tone);
      const te = document.querySelector('[data-p="'+pid+'"][data-f="title"]');
      const be = document.querySelector('[data-p="'+pid+'"][data-f="body"]');
      const tge = document.querySelector('[data-p="'+pid+'"][data-f="tags"]');
      if (te) { te.value = title; te.dispatchEvent(new Event('input')); }
      if (be) { be.value = body; be.dispatchEvent(new Event('input')); }
      if (tge) { tge.value = tags; tge.dispatchEvent(new Event('input')); }
    });
    btn.disabled = false; btn.textContent = '生成文案';
    closeAiModal(); updatePreview(); toast('文案已生成');
  }, 1000);
}

function mockCopy(pid, meta, name, points, tone) {
  const s = points || name;
  let title='', body='', tags='';
  switch(pid) {
    case 'xhs':
      const xt = tone==='种草' ? ['这个质感绝了 ✨','姐妹们冲！开箱来啦 💖','被问爆了终于安排上']
        : tone==='促销' ? ['限时特惠！速冲 🏃','性价比炸裂！别错过','好价预警 ⚡']
        : ['深度实测来啦 📝','开箱+一周体验','真实评测分享'];
      title = (name+' | '+xt[0]).substring(0, meta.titleMax);
      body = (tone==='种草'?'一直在找合适的'+name+'，终于挖到宝！\n\n质感超好，细节精致，完全不输大牌。\n\n'+s+'\n\n推荐指数：⭐⭐⭐⭐⭐'
        :tone==='促销'?'🔥 限时优惠！'+name+'\n\n'+s+'\n\n手慢无，赶紧冲！\n\n#限时折扣'
        :'【真实评测】'+name+'\n\n使用一周后的深度体验：\n\n优点：'+s+'\n\n适合人群：追求品质的你\n\n推荐指数：⭐⭐⭐⭐').substring(0, meta.bodyMax);
      break;
    case 'dy': case 'ks':
      title = (name+'，'+s.split('·')[0]+'太好用了！').substring(0, meta.titleMax);
      tags = (pid==='ks'?'老铁推荐 ':'好物推荐 ')+'种草 性价比 真实测评';
      break;
    case 'sph':
      title = (name+'，品质生活的选择').substring(0, meta.titleMax);
      tags = '好物推荐 品质生活 种草';
      break;
    case 'tb': case 'jd':
      title = (name+' 正品保证 顺丰包邮').substring(0, meta.titleMax);
      body = ('【'+name+'】\n\n✅ '+s.replace(/·/g,'\n✅ ')+'\n\n现货速发 · '+ (pid==='jd'?'京东自营':'') +'\n支持7天无理由').substring(0, meta.bodyMax);
      break;
  }
  return { title, body, tags };
}

function toast(msg) {
  const e = document.querySelector('.toast'); if (e) e.remove();
  const t = document.createElement('div'); t.className='toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

// ── Init ──
bindPlatforms();
loadContent();
updateStatus();
</script>
