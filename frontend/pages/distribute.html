<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#F5F7FB" />
<link rel="icon" href="/assets/image.png" />
<title>分发中心 - NextGen Studio</title>
<style>
:root {
  --bg:#F5F7FB; --card:#FFFFFF; --line:rgba(27,43,65,.10); --line2:rgba(27,43,65,.06);
  --text:#1D2433; --muted:#5F6C80; --faint:#8A95A8; --blue:#007AFF; --orange:#FF6B35;
  --green:#1B9A4A; --warn:#B96A1A; --red:#D92D20; --soft:#F8FAFD;
  --shadow:0 18px 42px rgba(31,45,72,.10); --sm:0 1px 3px rgba(31,45,72,.08);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:linear-gradient(rgba(87,112,148,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(87,112,148,.045) 1px,transparent 1px),var(--bg);background-size:24px 24px,24px 24px,auto;color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:64px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:16px 10px;z-index:100;box-shadow:0 8px 24px rgba(31,45,72,.08)}
.sidebar-logo{width:30px;height:30px;border-radius:6px;margin-bottom:16px}
.nav-item{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:10px;color:var(--faint);text-decoration:none;margin-bottom:4px;position:relative}
.nav-item:hover,.nav-item.active{background:rgba(0,122,255,.10);color:var(--blue)}
.nav-item svg{width:20px;height:20px}
.nav-tooltip{position:absolute;left:54px;top:50%;transform:translateY(-50%);padding:4px 10px;background:#fff;border:1px solid var(--line);box-shadow:var(--sm);border-radius:6px;color:var(--text);font-size:11px;white-space:nowrap;opacity:0;pointer-events:none}
.nav-item:hover .nav-tooltip{opacity:1}
.page{height:100vh;margin-left:64px;display:grid;grid-template-rows:68px 1fr 68px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}
.brand{display:flex;align-items:center;gap:10px}.brand img{width:32px;height:32px;border-radius:8px}.brand strong{color:var(--blue);font-size:14px}.brand span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ghost,.primary,.plain,.mini{border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--muted);padding:9px 13px;font-size:12px;font-weight:800;cursor:pointer;text-decoration:none}
.primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 12px 26px rgba(0,122,255,.18)}
.plain{border-color:transparent;background:transparent}.mini{padding:6px 9px;border-radius:8px;font-size:11px}
.primary:disabled,.ghost:disabled{opacity:.45;cursor:not-allowed}
.workspace{min-height:0;display:grid;grid-template-columns:300px 330px minmax(460px,1fr);gap:0}
.panel{min-height:0;overflow:auto;padding:18px;border-right:1px solid var(--line);background:rgba(255,255,255,.70);transition:opacity .25s}
.panel:last-child{border-right:none}
.panel.disabled{opacity:.4;pointer-events:none;user-select:none}
.kicker{font-size:10px;color:var(--faint);font-weight:900;letter-spacing:1.4px;text-transform:uppercase}
.kicker-plat{font-size:12px;color:#000;font-weight:900;letter-spacing:0;text-transform:none}
.platform-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;box-shadow:var(--sm)}
.section-title{font-size:18px;font-weight:900;margin:5px 0 14px;letter-spacing:0}
.hint{font-size:12px;color:var(--muted);line-height:1.6}
.asset-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.asset{position:relative;aspect-ratio:1;border:2px solid transparent;border-radius:12px;background:#EEF3F9;overflow:hidden;cursor:pointer;box-shadow:var(--sm)}
.asset img,.asset video{width:100%;height:100%;object-fit:cover;display:block}
.asset.selected{border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,122,255,.10)}
.asset-badge{position:absolute;left:7px;bottom:7px;right:7px;padding:5px 7px;border-radius:8px;background:rgba(0,0,0,.58);color:#fff;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset-check{position:absolute;right:7px;top:7px;width:22px;height:22px;border-radius:999px;background:rgba(255,255,255,.88);border:1px solid var(--line)}
.asset.selected .asset-check{background:var(--blue);border-color:var(--blue)}
.asset.selected .asset-check:after{content:"";position:absolute;left:7px;top:4px;width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.platform-list{display:flex;flex-direction:column;gap:10px}.platform{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;box-shadow:var(--sm)}
.platform.selected{border-color:rgba(0,122,255,.34);box-shadow:0 0 0 4px rgba(0,122,255,.08)}
.platform-head{display:flex;align-items:flex-start;gap:10px}.pmark{width:10px;height:10px;border-radius:50%;margin-top:4px}.pname{font-weight:900;font-size:13px}.ptype{margin-left:auto;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900}
.type-official{background:rgba(27,154,74,.10);color:var(--green)}.type-assisted{background:rgba(185,106,26,.10);color:var(--warn)}.type-commerce{background:rgba(0,122,255,.10);color:var(--blue)}
.pnote{margin:8px 0 0 20px;font-size:11px;color:var(--muted);line-height:1.45}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}.tab{border:1px solid var(--line);background:#fff;color:var(--muted);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900;cursor:pointer}.tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.editor-layout{display:grid;grid-template-columns:minmax(260px,1fr) 310px;gap:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--sm)}
.form-stack{display:flex;flex-direction:column;gap:12px}.field label{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;font-weight:900;margin-bottom:6px}
.field .input-wrapper{position:relative;border:1px solid var(--line);border-radius:10px;background:var(--soft);transition:border-color .2s,box-shadow .2s}.field .input-wrapper:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12);background:#fff}.field .input-wrapper.limit-reached{border-color:var(--red);box-shadow:0 0 0 3px rgba(217,45,32,.12)}.field .input-wrapper.limit-reached:focus-within{box-shadow:0 0 0 3px rgba(217,45,32,.18)}.field .input-wrapper input,.field .input-wrapper textarea{width:100%;border:none;background:transparent;padding:10px 80px 10px 11px;font:inherit;font-size:13px;color:var(--text);outline:none}.field .input-wrapper textarea{min-height:92px;resize:vertical;line-height:1.55;padding-right:80px}.field .counter{position:absolute;top:8px;right:8px;font-size:11px;color:var(--faint);background:rgba(0,0,0,.06);padding:3px 8px;border-radius:8px;user-select:none;font-variant-numeric:tabular-nums;transition:all .2s;line-height:1;pointer-events:none;z-index:1}.field .counter .current{font-weight:700;color:var(--blue)}.field .counter .separator{color:var(--line2);margin:0 1px}.field .counter .limit{color:var(--faint)}.field .counter.warning{background:rgba(185,106,26,.12);color:var(--warn)}.field .counter.warning .current{color:var(--warn)}.field .counter.danger{background:rgba(217,45,32,.10);color:var(--red)}.field .counter.danger .current{color:var(--red)}.tag-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.tag{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 9px;font-size:11px;color:var(--muted);cursor:default}.tag.active{border-color:rgba(0,122,255,.30);background:rgba(0,122,255,.08);color:var(--blue);display:inline-flex;align-items:center;gap:4px}.tag .tag-text{cursor:default}.tag .delete-btn{display:none;width:16px;height:16px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:10px;line-height:16px;text-align:center;cursor:pointer;padding:0;flex-shrink:0;transition:all .15s}.tag .delete-btn:hover{background:var(--red);transform:scale(1.15)}.tag:hover .delete-btn{display:inline-flex;align-items:center;justify-content:center}.tag-row .counter{position:static;margin-left:auto;align-self:center}
.validation{display:flex;flex-direction:column;gap:8px}.issue{padding:9px 10px;border-radius:10px;font-size:12px;line-height:1.45;border:1px solid var(--line)}
.issue.error{background:#FFF1F0;color:var(--red);border-color:rgba(217,45,32,.22)}.issue.warning{background:#FFF7ED;color:var(--warn);border-color:rgba(185,106,26,.22)}.issue.info{background:#F0F7FF;color:var(--blue);border-color:rgba(0,122,255,.20)}
.preview{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.preview-card{border:1px solid var(--line);border-radius:14px;background:#fff;overflow:hidden;box-shadow:var(--sm)}
.preview-card img,.preview-card video{width:100%;aspect-ratio:16/9;object-fit:cover;background:#EEF3F9}
.preview-body{padding:12px}.preview-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.preview-title{font-size:14px;font-weight:900;line-height:1.4;margin-top:4px}.preview-text{margin-top:7px;color:var(--muted);font-size:12px;line-height:1.55}.preview-tags{margin-top:8px;color:var(--blue);font-size:11px;line-height:1.5}
.preview-actions,.job-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.queue{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto}.job{display:grid;grid-template-columns:1fr auto;gap:12px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;box-shadow:var(--sm)}
.job strong{font-size:12px}.job small{display:block;color:var(--muted);font-size:11px;margin-top:4px;line-height:1.45}.job-detail{grid-column:1/-1;color:var(--muted);font-size:12px;line-height:1.55;background:var(--soft);border:1px solid var(--line2);border-radius:10px;padding:10px}
.status-pill{align-self:start;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;background:#EEF4FF;color:var(--blue)}
.bottom{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;background:rgba(255,255,255,.94);border-top:1px solid var(--line);backdrop-filter:blur(14px)}
.summary{display:flex;gap:16px;color:var(--muted);font-size:12px;flex-wrap:wrap}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:2000;background:#172033;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;box-shadow:var(--shadow)}
.empty{padding:18px;border:1px dashed var(--line);border-radius:14px;background:rgba(255,255,255,.60);color:var(--muted);font-size:12px;line-height:1.7}.empty a{color:var(--blue);font-weight:900;text-decoration:none}
.modal-overlay[hidden]{display:none!important}
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:16px;padding:24px;max-width:640px;width:90vw;max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
.modal-box h3{margin:0 0 16px;font-size:16px}.modal-close{float:right;cursor:pointer;font-size:22px;color:var(--faint);line-height:1}
.modal-body{font-size:13px;line-height:1.6}.modal-body img{margin-top:12px;max-width:100%;border:1px solid var(--line);border-radius:8px}
@media(max-width:1180px){.workspace{grid-template-columns:260px 280px 1fr}.editor-layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<aside class="sidebar">
  <a href="/pages/index.html"><img class="sidebar-logo" src="/assets/image.png" alt="NextGen" /></a>
  <a href="/pages/agent.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 8h20M2 16h20"/><circle cx="8" cy="12" r="2" fill="currentColor" stroke="none"/></svg><span class="nav-tooltip">做视频</span></a>
  <a href="/pages/image-editor.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><path d="M21 15l-5-5L5 21"/></svg><span class="nav-tooltip">做图片</span></a>
  <a href="/pages/distribute.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg><span class="nav-tooltip">去分发</span></a>
  <a href="/pages/settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span class="nav-tooltip">设置</span></a>
</aside>

<main class="page">
  <header class="topbar">
    <div class="brand"><img src="/assets/image.png" alt="" /><div><strong>NEXTGEN</strong><span>分发中心</span></div></div>
    <div class="top-actions">
      <a class="plain" href="/pages/index.html">返回首页</a>
    </div>
  </header>

  <section class="workspace">
    <aside class="panel">
      <span class="kicker">STEP 01</span>
      <h1 class="section-title">选择素材</h1>
      <p class="hint">来自做图片、做视频保存的素材。没有素材时可以先进入图片或视频工具生成。</p>
      <div class="asset-grid" id="assetGrid"></div>
    </aside>

    <aside class="panel">
      <span class="kicker">STEP 02</span>
      <h2 class="section-title">选择平台</h2>
      <div class="platform-list" id="platformList"></div>
    </aside>

    <section class="panel">
      <span class="kicker">STEP 03</span>
      <h2 class="section-title">内容适配与发布</h2>
      <div class="tabs">
        <button class="tab active" data-tab="editor">平台文案</button>
        <button class="tab" data-tab="preview">发布预览</button>
        <button class="tab" data-tab="queue">发布队列</button>
      </div>
      <div id="editorTab" class="tab-panel">
        <div class="editor-layout">
          <div class="card"><div class="form-stack" id="postForms"></div></div>
          <div class="card">
            <div class="kicker">CHECKLIST</div>
            <h3 class="section-title" style="font-size:16px;margin-bottom:10px">校验结果</h3>
            <div class="validation" id="validationBox"></div>
          </div>
        </div>
      </div>
      <div id="previewTab" class="tab-panel" hidden><div class="preview" id="previewList"></div></div>
      <div id="queueTab" class="tab-panel" hidden><div class="card"><div class="queue" id="queueList"></div></div></div>
    </section>
  </section>

  <footer class="bottom">
    <div class="summary">
      <span id="assetSummary">未选择素材</span>
      <span id="platformSummary">未选择平台</span>
      <span id="modeSummary">官方 API / 辅助发布分流</span>
    </div>
    <div class="top-actions">
      <button class="ghost" id="validateBtn">合规校验</button>
      <button class="ghost" id="queueBtn" disabled>加入发布队列</button>
      <button class="ghost" id="clearBtn">清空</button>
    </div>
  </footer>
</main>

<script>
const FALLBACK_PLATFORMS = [
  { id:'xhs', name:'小红书', kind:'browser_automation', title_max:20, body_max:1000, tags_max:10, status:'浏览器自动化', note:'自动发布到小红书。首次使用需扫码登录。', official_entry:'https://creator.xiaohongshu.com/' },
  { id:'douyin', name:'抖音', kind:'browser_automation', title_max:55, body_max:0, tags_max:12, status:'辅助发布', note:'生成发布包，由运营人员在抖音创作者后台复制、检查并确认发布。', official_entry:'https://creator.douyin.com/' },
  { id:'kuaishou', name:'快手', kind:'browser_automation', title_max:55, body_max:0, tags_max:12, status:'浏览器自动化', note:'自动发布到快手。首次使用需扫码登录。', official_entry:'https://cp.kuaishou.com/' },
  { id:'tencent', name:'视频号', kind:'browser_automation', title_max:55, body_max:0, tags_max:10, status:'浏览器自动化', note:'自动发布到视频号。首次使用需扫码登录。', official_entry:'https://channels.weixin.qq.com/' },
  { id:'bilibili', name:'B站', kind:'browser_automation', title_max:80, body_max:2000, tags_max:10, status:'浏览器自动化', note:'自动发布到B站。首次使用需扫码登录。', official_entry:'https://member.bilibili.com/' },
  { id:'taobao', name:'淘宝', kind:'commerce_api', title_max:30, body_max:500, tags_max:0, status:'商家接口', note:'用于商家素材同步，不做社媒模拟发布。', official_entry:'https://open.taobao.com/' },
  { id:'jd', name:'京东', kind:'commerce_api', title_max:30, body_max:500, tags_max:0, status:'商家接口', note:'用于商家素材同步。', official_entry:'https://jos.jd.com/' },
];
const COLORS = { xhs:'#FF2442', douyin:'#111827', kuaishou:'#FF4906', tencent:'#07C160', bilibili:'#FB7299', taobao:'#FF5000', jd:'#E2231A' };
const state = { assets: [], selectedAssets: new Set(), platforms: [], selectedPlatforms: new Set(), posts: {}, validation: [], jobs: [], tasks: [] };
const $ = (s) => document.querySelector(s);

function safeJson(key, fallback) { try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); } catch (_) { return fallback; } }
function saveJson(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {} }
async function apiJson(url, options) {
  const res = await fetch(url, options);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(data.message || data.error || 'request failed'), { data });
  return data;
}
function kindClass(kind) { return kind === 'commerce_api' ? 'type-commerce' : 'type-assisted'; }
function kindLabel(kind) { return kind === 'commerce_api' ? '商家接口' : kind === 'browser_automation' ? '自动发布' : '辅助发布'; }
function escapeHtml(text) { return String(text || '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function toast(text) {
  const old = document.querySelector('.toast'); if (old) old.remove();
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = text;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2200);
}
async function copyText(text) {
  const value = String(text || '').trim();
  if (!value) { toast('没有可复制内容'); return; }
  try { await navigator.clipboard.writeText(value); }
  catch (_) {
    const area = document.createElement('textarea');
    area.value = value; area.style.position = 'fixed'; area.style.opacity = '0';
    document.body.appendChild(area); area.select(); document.execCommand('copy'); area.remove();
  }
  toast('已复制到剪贴板');
}
function platformName(id) { return (state.platforms.find((p) => p.id === id) || {}).name || id; }

async function loadPlatforms() {
  try {
    const data = await apiJson('/api/distribution/platforms');
    state.platforms = data.platforms || FALLBACK_PLATFORMS;
  } catch (_) { state.platforms = FALLBACK_PLATFORMS; }
  renderPlatforms();
}

async function loadJobs() {
  const local = safeJson('nextgen_distribution_jobs', []);
  try {
    const data = await apiJson('/api/distribution/jobs');
    const remote = data.jobs || [];
    const ids = new Set(remote.map((job) => job.id));
    state.jobs = [...remote, ...local.filter((job) => !ids.has(job.id))];
  } catch (_) { state.jobs = local; }
  saveJson('nextgen_distribution_jobs', state.jobs);
  renderQueue();
}
function loadAssets() {
  const seen = new Set();
  const assets = [...safeJson('nextgen_assets', []), ...safeJson('nextgen_history', [])]
    .filter((item) => {
      const url = item && (item.url || item.video_url || item.src || '');
      if (!url || seen.has(url)) return false;
      seen.add(url);
      return true;
    });
  state.assets = assets.slice(0, 30).map((item, i) => ({
    id: item.id || `asset_${i}`,
    type: item.type || (String(item.url || '').includes('video') ? 'video' : 'image'),
    url: item.url || item.video_url || item.src || '',
    label: item.prompt || item.label || item.title || `素材 ${i + 1}`,
  })).filter((item) => item.url);
  renderAssets();
}
function renderAssets() {
  const grid = $('#assetGrid');
  if (!state.assets.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">暂无可分发素材。<br><a href="/pages/image-editor.html">先去生成图片</a> 或 <a href="/pages/agent.html">先去生成视频</a></div>';
    return;
  }
  grid.innerHTML = state.assets.map((asset) => `
    <div class="asset ${state.selectedAssets.has(asset.id) ? 'selected' : ''}" data-asset="${asset.id}">
      ${asset.type === 'video' ? `<video src="${asset.url}" muted></video>` : `<img src="${asset.url}" alt="">`}
      <span class="asset-check"></span><span class="asset-badge">${escapeHtml(asset.label).slice(0, 24)}</span>
    </div>`).join('');
  grid.querySelectorAll('.asset').forEach((el) => {
    el.addEventListener('click', () => {
      const id = el.dataset.asset;
      if (!state.selectedAssets.has(id)) {
        const asset = state.assets.find(function(a) { return a.id === id; });
        var existingTypes = {};
        state.selectedAssets.forEach(function(sid) {
          var s = state.assets.find(function(a) { return a.id === sid; });
          if (s) existingTypes[s.type] = true;
        });
        var typeKeys = Object.keys(existingTypes);
        if (typeKeys.length && !existingTypes[asset.type]) {
          toast('素材类型不可混选，请先清空已选的' + (typeKeys[0] === 'video' ? '视频' : '图片'));
          return;
        }
        state.selectedAssets.add(id);
      } else {
        state.selectedAssets.delete(id);
      }
      renderAssets(); renderForms(); renderPreview(); updateSummary();
    });
  });
}
function renderPlatforms() {

function selectedAssets() { return state.assets.filter((a) => state.selectedAssets.has(a.id)); }

function renderForms() {

  }

  forms.innerHTML = platforms.map((p) => {

        <div class="field"><label><span>标题</span></label><div class="input-wrapper"><input data-field="title" data-platform="${p.id}" maxlength="${p.title_max}" value="${escapeHtml(post.title)}" /><div class="counter"><span class="current">${post.title.length}</span><span class="separator">/</span><span class="limit">${p.title_max}</span></div></div></div>
        ${showBody ? `<div class="field"><label><span>正文</span></label><div class="input-wrapper"><textarea data-field="body" data-platform="${p.id}" maxlength="${bodyMax}">${escapeHtml(post.body)}</textarea><div class="counter"><span class="current">${post.body.length}</span><span class="separator">/</span><span class="limit">${bodyMax}</span></div></div></div>` : ''}

  forms.querySelectorAll('[data-field]').forEach((el) => {

      state.posts[el.dataset.platform][el.dataset.field] = el.value;
      if (e.isComposing) return;
      const wrapper = el.closest('.input-wrapper');
      if (wrapper) {
        const counter = wrapper.querySelector('.counter');
        if (counter) {
          const current = counter.querySelector('.current');
          const max = parseInt(el.getAttribute('maxlength')) || 2000;
          const len = el.value.length;
          current.textContent = len;
          counter.classList.remove('warning', 'danger');
          wrapper.classList.remove('limit-reached');
          if (len >= max) {
            counter.classList.add('danger');
            wrapper.classList.add('limit-reached');
          } else if (len >= max * 0.85) {
            counter.classList.add('warning');
          }
        }
      }

  });
  forms.querySelectorAll('[data-del-tag]').forEach((el) => {
    el.addEventListener('click', (e) => {

      post.tags = post.tags.filter((x) => x !== tagText);
      renderForms(); renderPreview();
    });
  });
  forms.querySelectorAll('[data-new-tag-btn]').forEach((el) => {
    el.addEventListener('click', () => {
      const pf = el.closest('.platform-card');
      const pid = pf.dataset.form;
      const post = state.posts[pid];
      const platform = state.platforms.find(function(p) { return p.id === pid; });
      const max = platform ? platform.tags_max : 10;
      if (post.tags.length >= max) { toast('已达到话题上限'); return; }

  forms.querySelectorAll('[data-new-tag-input]').forEach((el) => {

      const post = state.posts[el.dataset.platform];
      if (post.tags.includes(val)) return;
      const platform = state.platforms.find(function(p) { return p.id === el.dataset.platform; });

    el.addEventListener('keydown', (e) => {

function renderTagsSection(pid, post, tagsMax) {

  const tagsHtml = post.tags.map((t) =>

}
function buildPosts() {
  const assets = selectedAssets();
  return selectedPlatforms().map((p) => ({ ...state.posts[p.id], platform: p.id, assets }));
}
function localValidate(posts) {
  return posts.map((post) => {
    const p = state.platforms.find((item) => item.id === post.platform);
    const issues = [];
    if (!post.assets.length) issues.push({ level:'error', message:'至少选择一个素材。' });
    if (!post.title) issues.push({ level:'error', message:`${p.name} 标题不能为空。` });
    if (post.title && post.title.length > p.title_max) issues.push({ level:'error', message:`标题超过 ${p.title_max} 字。` });
    if (p.body_max && post.body.length > p.body_max) issues.push({ level:'error', message:`正文超过 ${p.body_max} 字。` });
    if (p.tags_max && post.tags.length > p.tags_max) issues.push({ level:'warning', message:`话题超过 ${p.tags_max} 个，建议精简。` });
    issues.push({ level:'info', message:'将生成发布包，由人工在官方后台确认。' });
    return { platform: post.platform, issues };
  });
}
async function validatePosts() {
  const posts = buildPosts();
  if (!posts.length) { state.validation = []; renderValidation(); return false; }
  try {
    const data = await apiJson('/api/distribution/validate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ posts }) });
    state.validation = data.results || [];
  } catch (_) { state.validation = localValidate(posts); }
  renderValidation();
  return state.validation.every((row) => !row.issues.some((i) => i.level === 'error'));
}
function renderValidation() {

  box.innerHTML = state.validation.map((row) => {

async function createQueueJob() {
  const ok = await validatePosts();
  if (!ok) { toast('校验未通过，请先修正红色问题'); return; }
  const body = { posts: buildPosts(), scheduled_at: '' };
  try {
    const data = await apiJson('/api/distribution/jobs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    state.jobs.unshift(data.job);
  } catch (_) { state.jobs.unshift({ id:`local_${Date.now()}`, status:'queued', posts:body.posts, created_at:new Date().toISOString() }); }
  saveJson('nextgen_distribution_jobs', state.jobs);
  renderQueue(); switchTab('queue'); toast('已加入发布队列');
}
function renderQueue() {
  const list = $('#queueList');
  const activeTasks = (state.tasks || []).filter(t => t.status === 'running' || t.status === 'queued');
  const doneTasks = (state.tasks || []).filter(t => t.status !== 'running' && t.status !== 'queued');

  const items = [];
  activeTasks.forEach(t => items.push({ type: 'task', data: t }));
  state.jobs.filter(j => j.status === 'queued' || j.status === 'published').forEach(j => items.push({ type: 'job', data: j }));
  doneTasks.forEach(t => items.push({ type: 'task', data: t }));

  if (!items.length) {
    list.innerHTML = '<div class="empty">暂无发布任务。选择素材和平台后，"加入发布队列"即可在这里统一管理发布流程。</div>';
    return;
  }

  list.innerHTML = items.map(item => {
    if (item.type === 'job') {
      const job = item.data;
      const platforms = (job.posts || []).map(p => platformName(p.platform)).join(' / ');
      const detail = (job.results || []).map(r => `${platformName(r.platform)}：${r.message || r.status}`).join('<br>') || '待执行。点击"一键发布"生成发布包并触发上传。';
      const sl = { queued: '等待中', published: '已发布' };
      const sc = { queued: { bg: 'rgba(0,122,255,.10)', c: 'var(--blue)' }, published: { bg: 'rgba(27,154,74,.10)', c: 'var(--green)' } };
      const s = sc[job.status] || sc.queued;
      let actions = ``;
      if (job.status === 'queued') actions = `<button class="primary mini" data-job-action="run" data-id="${job.id}">一键发布</button>`;
      actions += `<button class="mini" data-job-action="delete" data-id="${job.id}">删除</button>`;
      return `<div class="job" data-job="${job.id}"><div><strong>${job.id}</strong><small>${platforms}<br>${new Date(job.created_at || Date.now()).toLocaleString()}</small></div><span class="status-pill" style="background:${s.bg};color:${s.c}">${sl[job.status] || job.status}</span><div class="job-detail">${detail}</div><div class="job-actions">${actions}</div></div>`;
    }
    const task = item.data;
    const accountLabel = task.account === 'default' ? '默认账号' : task.account;
    const sc = { running: { bg: 'rgba(0,122,255,.10)', c: 'var(--blue)' }, queued: { bg: 'rgba(0,122,255,.08)', c: 'var(--blue)' }, success: { bg: 'rgba(27,154,74,.10)', c: 'var(--green)' }, failed: { bg: 'rgba(217,45,32,.10)', c: 'var(--red)' } };
    const sl = { running: '上传中', queued: '等待中', success: '已发布', failed: '失败' };
    const s = sc[task.status] || sc.queued;
    let taskActions = '';
    if (task.status === 'failed') {
      taskActions = `<button class="mini" data-task-detail="${task.id}">详情</button><button class="mini" data-task-retry="${task.id}">重新发布</button>`;
    }
    taskActions += `<button class="mini" data-task-delete="${task.id}">删除</button>`;
    return `<div class="job" data-task="${task.id}"><div><strong>${escapeHtml(task.title || '视频')}</strong><small>${_PLATFORM_NAMES[task.platform] || task.platform} · ${accountLabel}<br>${new Date(task.created_at).toLocaleString()}</small></div><span class="status-pill" style="background:${s.bg};color:${s.c}">${sl[task.status] || task.status}</span><div class="job-detail">${task.progress || ''}${task.error ? '<br><span style="color:var(--red)">错误: ' + escapeHtml(task.error) + '</span>' : ''}${task.duration_ms ? '<br>耗时: ' + (task.duration_ms / 1000).toFixed(1) + 's' : ''}</div><div class="job-actions">${taskActions}</div></div>`;
  }).join('');

  list.querySelectorAll('[data-job-action]').forEach(btn => {
    btn.addEventListener('click', () => handleJobAction(btn.dataset.jobAction, btn.dataset.id));
  });

  list.querySelectorAll('[data-task-detail]').forEach(btn => {
    btn.addEventListener('click', () => showTaskDetail(btn.dataset.taskDetail));
  });
  list.querySelectorAll('[data-task-retry]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const task = state.tasks.find(t => t.id === btn.dataset.taskRetry);
      if (!task || !task.payload) { toast('缺少发布数据，无法重发'); return; }
      btn.disabled = true; btn.textContent = '重发中...';
      try {
        const data = await apiJson('/api/distribution/publish', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify(task.payload),
        });
        if (data.ok) toast('重新发布任务已创建');
        loadPublishTasks();
      } catch (err) { toast(err.message || '重发失败'); }
      btn.disabled = false; btn.textContent = '重新发布';
    });
  });
  list.querySelectorAll('[data-task-delete]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const task = state.tasks.find(t => t.id === btn.dataset.taskDelete);
      if (!task) return;
      try {
        const ss = _extractScreenshot(task.error);
        await apiJson(`/api/distribution/tasks/${task.id}?screenshot=${encodeURIComponent(ss || '')}`, { method:'DELETE' });
      } catch (_) {}
      state.tasks = state.tasks.filter(t => t.id !== task.id);
      renderQueue();
    });
  });

  if (activeTasks.length && !_taskPollTimer) {
    _taskPollTimer = setInterval(loadPublishTasks, 3000);
  } else if (!activeTasks.length && _taskPollTimer) {
    clearInterval(_taskPollTimer);
    _taskPollTimer = null;
  }
}
function _extractScreenshot(errorText) {
  if (!errorText) return '';
  const m = errorText.match(/截图:\s*(\S+\.png)/);
  return m ? m[1] : '';
}

function showTaskDetail(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  let html = `<p><strong>平台:</strong> ${_PLATFORM_NAMES[task.platform] || task.platform}</p>`;
  html += `<p><strong>账号:</strong> ${task.account === 'default' ? '默认账号' : task.account}</p>`;
  html += `<p><strong>标题:</strong> ${escapeHtml(task.title || '')}</p>`;
  html += `<p><strong>错误:</strong> ${escapeHtml(task.error || '无')}</p>`;
  if (task.duration_ms) html += `<p><strong>耗时:</strong> ${(task.duration_ms / 1000).toFixed(1)}s</p>`;
  const ss = _extractScreenshot(task.error);
  if (ss) {
    html += `<p><strong>截图:</strong></p><img src="/api/distribution/screenshots/${encodeURIComponent(ss)}" alt="拦截弹窗截图" onerror="this.style.display='none'">`;
  }
  $('#taskDetailBody').innerHTML = html;
  document.getElementById('taskDetailModal').hidden = false;
}

async function handleJobAction(action, id) {
  const job = state.jobs.find((item) => item.id === id);
  if (!job) return;
  if (action === 'delete') {
    try { if (!id.startsWith('local_')) await apiJson(`/api/distribution/jobs/${id}`, { method:'DELETE' }); } catch (_) {}
    state.jobs = state.jobs.filter((item) => item.id !== id);
    saveJson('nextgen_distribution_jobs', state.jobs);
    renderQueue(); return;
  }
  if (action === 'run') {
    try {
      if (!id.startsWith('local_')) Object.assign(job, (await apiJson(`/api/distribution/jobs/${id}/publish`, { method:'POST' })).job);
      else { job.status = 'published'; }
      saveJson('nextgen_distribution_jobs', state.jobs);
      loadPublishTasks();
      return;
    } catch (err) { toast(err.message || '执行失败'); }
  }
  saveJson('nextgen_distribution_jobs', state.jobs);
  renderQueue();
}
function updateSummary() {
  $('#assetSummary').textContent = state.selectedAssets.size ? `已选 ${state.selectedAssets.size} 个素材` : '未选择素材';
  $('#platformSummary').textContent = state.selectedPlatforms.size ? `已选 ${state.selectedPlatforms.size} 个平台` : '未选择平台';
  const selected = selectedPlatforms();
  $('#modeSummary').textContent = '辅助发布 / 官方 API / 商家接口分流';
  const ready = state.selectedAssets.size && state.selectedPlatforms.size;
  $('#queueBtn').disabled = !ready;
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((btn) => btn.classList.toggle('active', btn.dataset.tab === tab));
  ['editor','preview','queue'].forEach((name) => { const el = $(`#${name}Tab`); if (el) el.hidden = name !== tab; });
  if (tab === 'preview') renderPreview();
  if (tab === 'queue') { loadPublishTasks(); }
}
function clearAll() {
  state.selectedAssets.clear(); state.selectedPlatforms.clear(); state.validation = [];
  renderAssets(); renderPlatforms(); renderForms(); renderPreview(); renderValidation(); updateSummary();
}

const _PLATFORM_NAMES = { douyin:'抖音', kuaishou:'快手', xhs:'小红书', bilibili:'B站', tencent:'视频号' };

// ======================================================================
// Task polling (auto-refresh task list)
// ======================================================================
let _taskPollTimer = null;

async function loadPublishTasks() {
  try {
    const data = await apiJson('/api/distribution/tasks');
    state.tasks = data.tasks || [];
  } catch (_) { state.tasks = []; }
  renderQueue();
}

// ======================================================================
// Auto-publish (via browser automation)
// ======================================================================
async function autoPublish() {
  const ok = await validatePosts();
  if (!ok) { toast('校验未通过，请先修正红色问题'); return; }
  const posts = buildPosts();
  if (!posts.length) { toast('请先选择素材和平台'); return; }

  for (const post of posts) {
    const assets = selectedAssets();
    const videoAsset = assets.find(a => a.type === 'video');
    const imageAssets = assets.filter(a => a.type === 'image');
    const body = {
      platform: post.platform,
      account: 'default',
      title: post.title,
      description: post.body || '',
      tags: post.tags || [],
      schedule_time: '',
    };
    if (videoAsset) {
      body.video_path = videoAsset.url;
      body.thumbnail = imageAssets.length ? imageAssets[0].url : '';
    } else if (imageAssets.length) {
      body.image_paths = imageAssets.map(a => a.url).filter(Boolean);
    } else {
      toast(`${_PLATFORM_NAMES[post.platform] || post.platform}: 未选择素材，跳过`);
      continue;
    }
    try {
      const data = await apiJson('/api/distribution/publish', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      if (data.ok) toast(`${_PLATFORM_NAMES[post.platform] || post.platform}: 发布任务已创建`);
    } catch (err) { toast(`${_PLATFORM_NAMES[post.platform] || post.platform}: ${err.message}`); }
  }
  switchTab('queue');
}

function updateStepActivation() {
  const panels = document.querySelectorAll('.workspace > .panel');
  panels.forEach((el, i) => {
    if (i === 1) { el.classList.toggle('disabled', state.selectedAssets.size === 0); }
    if (i === 2) { el.classList.toggle('disabled', state.selectedPlatforms.size === 0); }
  });
}

// Override key functions to also update step activation
const _origRenderAssets = renderAssets; renderAssets = function() { _origRenderAssets(); updateStepActivation(); };
const _origUpdateSummary = updateSummary; updateSummary = function() {
  _origUpdateSummary();
  updateStepActivation();
};

document.querySelectorAll('.tab').forEach((btn) => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
$('#validateBtn').addEventListener('click', validatePosts);
$('#queueBtn').addEventListener('click', createQueueJob);
$('#clearBtn').addEventListener('click', clearAll);
loadAssets();
Promise.all([loadPlatforms(), loadJobs()]).then(() => { renderForms(); renderPreview(); renderQueue(); updateSummary(); });

// Auto-poll tasks that are running
loadPublishTasks();
</script>

<div id="taskDetailModal" class="modal-overlay" hidden onclick="if(event.target===this)this.hidden=true">
  <div class="modal-box">
    <span class="modal-close" onclick="document.getElementById('taskDetailModal').hidden=true">&times;</span>
    <h3>任务详情</h3>
    <div id="taskDetailBody" class="modal-body"></div>
  </div>
</div>
</body>
</html>
