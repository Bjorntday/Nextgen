<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root { --bg: #F5F5F7; --card: #FFFFFF; --primary: #007AFF; --text: #1D1D1F; --text2: #6E6E73; --text3: #99999D; --border: rgba(0,0,0,0.06); --muted: #F9F9FB; --green: #34C759; --red: #FF3B30; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
.sidebar { position:fixed; left:0; top:0; bottom:0; width:64px; background:#FFFFFF; border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:16px 10px; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.sidebar-logo { width:30px; height:30px; border-radius:6px; margin-bottom:16px; }
.nav-item { display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:10px; color:#99999D; cursor:pointer; text-decoration:none; transition:all 0.15s; margin-bottom:4px; }
.nav-item:hover { background:rgba(0,122,255,0.06); color:#007AFF; }
.nav-item.active { background:rgba(0,122,255,0.08); color:#007AFF; }
.main { margin-left:64px; padding:28px 36px; max-width:860px; }
h1 { font-size:22px; font-weight:700; margin-bottom:4px; }
.sub { font-size:13px; color:var(--text3); margin-bottom:24px; }

.tabs { display:flex; gap:0; margin-bottom:20px; }
.tab { padding:8px 18px; border:none; background:transparent; color:var(--text3); font-size:13px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

.region-label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1.2px; margin:24px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }

.provider { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; overflow:hidden; }
.provider-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; transition:background 0.15s; }
.provider-header:hover { background:var(--muted); }
.provider-header .chevron { transition:transform 0.2s; color:var(--text3); }
.provider.open .provider-header .chevron { transform:rotate(180deg); }
.provider-body { display:none; padding:0 14px 14px; flex-direction:column; gap:8px; }
.provider.open .provider-body { display:flex; }
.provider-name { font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; }
.provider-dot { width:6px; height:6px; border-radius:50%; }
.provider-rank { font-size:10px; color:var(--text3); font-weight:500; background:var(--muted); padding:2px 7px; border-radius:10px; }

.row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.row label { font-size:11px; color:var(--text2); font-weight:500; white-space:nowrap; min-width:52px; }
select, input[type="text"], input[type="password"] { padding:6px 9px; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text); font-size:12px; font-family:inherit; min-width:130px; }
select:focus, input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2px rgba(0,122,255,.1); }
select { cursor:pointer; }
.pwd-wrap { position:relative; display:inline-flex; }
.pwd-wrap input { padding-right:32px; }
.pwd-toggle { position:absolute; right:5px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text3); cursor:pointer; font-size:12px; padding:2px 3px; }
.endpoint { font-size:11px; color:var(--text3); padding:2px 0; }
.endpoint strong { color:var(--text2); font-weight:500; }

.btn { padding:7px 14px; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn-primary { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(0,122,255,.2); }
.btn-primary:hover { background:#0055CC; box-shadow:0 4px 14px rgba(0,122,255,.3); }
.btn-sm { padding:5px 10px; font-size:11px; }
.btn-test { padding:5px 12px; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text2); font-size:11px; cursor:pointer; transition:all 0.15s; }
.btn-test:hover { border-color:var(--primary); color:var(--primary); }
.btn-test.ok { background:#E8F8ED; border-color:var(--green); color:var(--green); }
.btn-test.fail { background:#FEE; border-color:var(--red); color:var(--red); }
.btn-test.loading { opacity:0.6; pointer-events:none; }

.default-section { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-top:20px; }
.default-section h3 { font-size:14px; font-weight:600; margin-bottom:10px; }

.custom-list { display:flex; flex-direction:column; gap:5px; }
.custom-item { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--muted); border-radius:8px; font-size:12px; }
.custom-item .name { font-weight:600; flex:1; }
.custom-item .detail { color:var(--text3); font-size:11px; }
.btn-danger { background:var(--red); color:#fff; font-size:11px; padding:4px 10px; }
.custom-form { background:var(--muted); border-radius:10px; padding:14px; margin-top:10px; display:flex; flex-direction:column; gap:8px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--primary); color:#fff; padding:10px 24px; border-radius:20px; font-size:13px; font-weight:600; z-index:1000; animation:toastIn .3s, toastOut .3s 2s forwards; }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity:0; } }
</style>
</head>

<main class="main">
  <h1>模型中心</h1>
  <p class="sub">统一管理文案、图片、视频模型；各功能页会自动读取这里的默认模型与 API Key。</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('llm')">LLM 文案模型</button>
    <button class="tab" onclick="switchTab('image')">图片生成模型</button>
    <button class="tab" onclick="switchTab('video')">视频生成模型</button>
    <button class="tab" onclick="switchTab('custom')">自定义 API</button>
  </div>

  <div class="tab-panel active" id="panel-llm"></div>
  <div class="tab-panel" id="panel-image"></div>
  <div class="tab-panel" id="panel-video"></div>
  <div class="tab-panel" id="panel-custom">
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px;">添加自己的 OpenAI 兼容 API 端点</p>
    <div class="custom-form">
      <div class="row"><label>名称</label><input type="text" id="customName" placeholder="我的模型" style="min-width:180px;" /></div>
      <div class="row"><label>端点</label><input type="text" id="customEndpoint" placeholder="https://my-api.com/v1" style="min-width:240px;" /></div>
      <div class="row"><label>模型名</label><input type="text" id="customModel" placeholder="model-name" style="min-width:140px;" /></div>
      <div class="row"><label>API Key</label><input type="password" id="customKey" placeholder="sk-..." /></div>
      <div class="row"><label>类型</label><select id="customType"><option value="llm">LLM</option><option value="image">图片</option><option value="video">视频</option></select></div>
      <button class="btn btn-primary btn-sm" style="align-self:flex-start;" onclick="addCustom()">+ 添加</button>
    </div>
    <div class="custom-list" id="customList" style="margin-top:12px;"></div>
  </div>

  <div class="default-section">
    <h3>默认模型选择</h3>
    <div class="row"><label>文案模型</label><select id="defaultLlm"></select></div>
    <div class="row"><label>图片模型</label><select id="defaultImage"></select></div>
    <div class="row"><label>视频模型</label><select id="defaultVideo"></select></div>
  </div>

  <div style="margin-top:20px; display:flex; gap:10px;">
    <button class="btn btn-primary" onclick="saveAll()">保存配置</button>
    <button class="btn btn-sm" style="background:var(--muted);border:1px solid var(--border);color:var(--text2);border-radius:8px;" onclick="exportConfig()" title="导出JSON">导出</button>
  </div>
</main>

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('.tab:nth-child('+({llm:1,image:2,video:3,custom:4}[tab])+')').classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

function applyHashRoute() {
  const hash = location.hash.replace('#', '');
  const providerMatch = hash.match(/^(image|video|llm)-models-(.+)$/);
  const targetProvider = providerMatch ? providerMatch[2] : '';
  if (hash === 'image-models' || hash.startsWith('image-models-')) switchTab('image');
  if (hash === 'video-models' || hash.startsWith('video-models-')) switchTab('video');
  if (hash === 'llm-models' || hash.startsWith('llm-models-')) switchTab('llm');
  if (hash === 'custom-api') switchTab('custom');
  if (targetProvider) {
    setTimeout(function() {
      const card = document.querySelector('.provider[data-provider="'+targetProvider+'"]');
      if (!card) return;
      card.classList.add('open');
      card.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 0);
  }
}

  panel.appendChild(createRegionLabel('国内'));
  CN_LLM.forEach(p => panel.appendChild(createProviderCard(p, 'llm')));
}

function createRegionLabel(text) {
  const d = document.createElement('div');
  d.className = 'region-label';
  d.textContent = text;
  return d;
}

function createProviderCard(p, cat) {
  const saved = (config[cat]||{})[p.id] || {};
  const modelOpts = p.models.map(m=>'<option value="'+m+'"'+(saved.model===m?' selected':'')+'>'+m+'</option>').join('');
  const hasKey = !!(saved.key);

  const d = document.createElement('div');
  d.className = 'provider';
  d.dataset.provider = p.id;
  d.dataset.cat = cat;
  d.innerHTML = '<div class="provider-header" onclick="this.parentElement.classList.toggle(\'open\')">'
    + '<span class="provider-name"><span class="provider-dot" style="background:'+(p.color||'#ccc')+'"></span>'+p.name+(p.rank?' <span class="provider-rank">'+p.rank+'</span>':'')+'</span>'
    + '<svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'
    + '</div>'
    + '<div class="provider-body">'
    + '<div class="row"><label>模型</label><select class="model-select" data-provider="'+p.id+'" data-cat="'+cat+'" onchange="onModelChange(\''+cat+'\',\''+p.id+'\',this.value)">'+modelOpts+'</select></div>'
    + '<div class="row"><label>API Key</label><div class="pwd-wrap"><input type="password" class="key-input" data-provider="'+p.id+'" data-cat="'+cat+'" placeholder="sk-..." value="'+(saved.key||'')+'" /><button class="pwd-toggle" onclick="togglePwd(this)">&#128065;</button></div>'
    + '<button class="btn-test" data-pid="'+p.id+'" data-cat="'+cat+'" data-endpoint="'+(p.endpoint||'')+'" onclick="testConnection(this)">'+(hasKey?'测试连接':'测试连接')+'</button></div>'
    + (p.endpoint ? '<div class="endpoint">端点: <strong>'+p.endpoint+'</strong> <span style="font-size:10px;color:var(--text3);">(v1/chat/completions)</span></div>' : '')
    + (p.buyLink ? '<a href="'+p.buyLink+'" target="_blank" style="display:inline-block;margin-top:4px;font-size:11px;color:var(--primary);text-decoration:none;">获取 API Key →</a>' : '')
    + '</div>';
  return d;
}

function renderCustom() {
  document.getElementById('customList').innerHTML = config.custom.map((c,i) =>
    '<div class="custom-item"><span class="name">'+c.name+'</span><span class="detail">'+c.endpoint+' · '+c.model+' · '+c.type+'</span><button class="btn-danger" onclick="removeCustom('+i+')">删除</button></div>'
  ).join('');
}

function onModelChange(cat, pid, value) { if(!config[cat][pid]) config[cat][pid]={}; config[cat][pid].model = value; }
function togglePwd(btn) { const inp=btn.parentElement.querySelector('input'); inp.type=inp.type==='password'?'text':'password'; }

function addCustom() {
  const n=document.getElementById('customName').value.trim(), e=document.getElementById('customEndpoint').value.trim();
  const m=document.getElementById('customModel').value.trim(), k=document.getElementById('customKey').value.trim();
  const t=document.getElementById('customType').value;
  if(!n||!e||!m){toast('请填写名称、端点和模型名');return;}
  config.custom.push({name:n,endpoint:e,model:m,key:k,type:t});
  document.getElementById('customName').value='';document.getElementById('customEndpoint').value='';
  document.getElementById('customModel').value='';document.getElementById('customKey').value='';
  renderCustom();refreshDefaults();toast('已添加');
}
function removeCustom(i){config.custom.splice(i,1);renderCustom();refreshDefaults();}

function testConnection(btn) {
  const pid = btn.dataset.pid, cat = btn.dataset.cat;
  const keyEl = document.querySelector('.key-input[data-provider="'+pid+'"][data-cat="'+cat+'"]');
  const key = keyEl ? keyEl.value.trim() : '';
  if (!key) { toast('请先填写 API Key'); return; }

  btn.classList.add('loading');
  btn.textContent = '连接中...';

  const endpoint = (btn.dataset.endpoint || 'api.openai.com').replace(/^https?:\/\//,'');
  const url = 'https://' + endpoint + '/v1/models';

  fetch(url, { method:'GET', headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'} })
    .then(r => {
      if (r.ok) { btn.classList.add('ok'); btn.classList.remove('loading','fail'); btn.textContent = '✓ 连接成功'; }
      else { throw new Error(r.status+' '+r.statusText); }
    })
    .catch(e => { btn.classList.add('fail'); btn.classList.remove('loading','ok'); btn.textContent = '✗ '+e.message.substring(0,20); })
    .finally(() => { setTimeout(()=>{ btn.classList.remove('ok','fail','loading'); btn.textContent='测试连接'; }, 4000); });
}

function refreshDefaults() {
  const lo=[], io=[], vo=[];
  [...INTL_LLM, ...CN_LLM].forEach(p=>{p.models.forEach(m=>lo.push(p.id+':'+m));});
  IMAGE_PROVIDERS.forEach(p=>{p.models.forEach(m=>io.push(p.id+':'+m));});
  VIDEO_PROVIDERS.forEach(p=>{p.models.forEach(m=>vo.push(p.id+':'+m));});
  config.custom.forEach(c=>{const m=c.name+':'+c.model; if(c.type==='llm')lo.push(m); if(c.type==='image')io.push(m); if(c.type==='video')vo.push(m);});
  function fill(id,opts,def){const s=document.getElementById(id);if(!s)return;s.innerHTML=opts.map(o=>'<option value="'+o+'"'+(def===o?' selected':'')+'>'+o+'</option>').join('');}
  fill('defaultLlm',lo,config.defaults.llm);
  fill('defaultImage',io,config.defaults.image);
  fill('defaultVideo',vo,config.defaults.video);
}

function syncDefaultModelToProvider(cat, value) {
  const parts = String(value || '').split(':');
  const pid = parts.shift();
  const model = parts.join(':');
  if (!pid || !model) return;
  if (!config[cat]) config[cat] = {};
  if (!config[cat][pid]) config[cat][pid] = {};
  config[cat][pid].model = model;
}

function saveAll() {
  document.querySelectorAll('.key-input').forEach(el=>{const c=el.dataset.cat,p=el.dataset.provider; if(!config[c][p])config[c][p]={}; config[c][p].key=el.value.trim();});
  document.querySelectorAll('.model-select').forEach(el=>{const c=el.dataset.cat,p=el.dataset.provider; if(!config[c][p])config[c][p]={}; config[c][p].model=el.value;});
  config.defaults.llm=document.getElementById('defaultLlm').value;
  config.defaults.image=document.getElementById('defaultImage').value;
  config.defaults.video=document.getElementById('defaultVideo').value;
  syncDefaultModelToProvider('llm', config.defaults.llm);
  syncDefaultModelToProvider('image', config.defaults.image);
  syncDefaultModelToProvider('video', config.defaults.video);
  localStorage.setItem('nextgen_api_config',JSON.stringify(config));
  toast('配置已保存');
}

function exportConfig() {
  const b=new Blob([JSON.stringify(config,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.download='nextgen-config-'+new Date().toISOString().slice(0,10)+'.json';a.href=URL.createObjectURL(b);a.click();toast('已导出');
}

function toast(m){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

// Init
renderLLMProviders();renderImageProviders();renderVideoProviders();renderCustom();refreshDefaults();

(function(){
  try{const s=JSON.parse(localStorage.getItem('nextgen_api_config'));if(s){if(s.llm)config.llm=s.llm;if(s.image)config.image=s.image;if(s.video)config.video=s.video;if(s.custom)config.custom=s.custom;if(s.defaults)config.defaults=s.defaults;
  renderLLMProviders();renderImageProviders();renderVideoProviders();renderCustom();refreshDefaults();
  document.querySelectorAll('.key-input').forEach(el=>{const c=el.dataset.cat,p=el.dataset.provider;const sv=(s[c]||{})[p]||{};el.value=sv.key||'';});}}catch(e){}
  applyHashRoute();
})();
window.addEventListener('hashchange', applyHashRoute);
</script>
</body>
</html>
