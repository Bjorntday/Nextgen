    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NextGen AI 视频生成助手 — 上传商品图，一键生成电商短视频" />
    <meta name="theme-color" content="#F5F7FB" />
    <meta name="robots" content="noindex, nofollow" />

    <style>
      body {
        color: #1D2433 !important;
        background:
          linear-gradient(rgba(87,112,148,0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(87,112,148,0.045) 1px, transparent 1px),
          linear-gradient(180deg, #F7FAFF 0%, #F5F7FB 42%, #EEF3F9 100%) !important;
        background-size: 24px 24px, 24px 24px, auto !important;
      }
      .sidebar {
        background: #FFFFFF !important;
        border-right: 1px solid rgba(27,43,65,0.08) !important;
        box-shadow: 0 8px 24px rgba(31,45,72,0.08) !important;
      }
      .nav-item { color: #8A95A8 !important; }
      .nav-item:hover,
      .nav-item.active {
        background: rgba(0,122,255,0.08) !important;
        color: #007AFF !important;
      }
      .agent-topbar,
      .chat-shell {
        color: #1D2433 !important;
        background: rgba(255,255,255,0.94) !important;
        border: 1px solid rgba(27,43,65,0.08) !important;
        box-shadow: 0 18px 42px rgba(31,45,72,0.10) !important;
      }
      .brand img { background:#fff !important; border-color:rgba(27,43,65,0.08) !important; }
      .brand strong { color:#007AFF !important; }
      .brand span,
      .back-link { color:#5F6C80 !important; }
      .lang-btn {
        color:#1D2433 !important;
        background:#F0F4FA !important;
        border-color:rgba(27,43,65,0.10) !important;
      }
      .chat-list {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0)),
          linear-gradient(90deg, rgba(87,112,148,0.055) 1px, transparent 1px) 0 0 / 20px 20px,
          linear-gradient(180deg, rgba(87,112,148,0.055) 1px, transparent 1px) 0 0 / 20px 20px !important;
      }
      .msg.system {
        color:#1D2433 !important;
        border-color:rgba(27,43,65,0.08) !important;
        background:#FFFFFF !important;
        box-shadow:0 10px 24px rgba(31,45,72,0.08) !important;
      }
      .composer {
        background:#FFFFFF !important;
        border-top:1px solid rgba(27,43,65,0.08) !important;
      }
      .composer input,
      .composer textarea,
      .composer select {
        color:#1D2433 !important;
        background:#F8FAFD !important;
        border-color:rgba(27,43,65,0.12) !important;
      }
      .composer .ghost,
      .compact-chip {
        color:#5F6C80 !important;
        background:#F8FAFD !important;
        border-color:rgba(27,43,65,0.10) !important;
      }
      .composer.composer-compact .video-engine-wrap {
        border-bottom-color:rgba(27,43,65,0.08) !important;
      }
      .composer.composer-compact .video-engine-caption { color:#5F6C80 !important; }
      .composer.composer-compact .engine-chip {
        background:#F0F4FA !important;
        border-color:rgba(27,43,65,0.10) !important;
        color:#5F6C80 !important;
        min-height:38px !important;
        display:inline-flex !important;
        flex-direction:column !important;
        align-items:center !important;
        justify-content:center !important;
        gap:2px !important;
        line-height:1.1 !important;
      }
      .composer.composer-compact .engine-chip .chip-main { font-weight:700; }
      .composer.composer-compact .engine-chip .chip-sub {
        max-width:92px;
        overflow:hidden;
        text-overflow:ellipsis;
        white-space:nowrap;
        font-size:10px;
        opacity:.72;
      }
      .composer.composer-compact .engine-chip.active {
        background:#007AFF !important;
        border-color:#007AFF !important;
        color:#fff !important;
      }
      .composer.composer-compact .engine-chip.default-only {
        border-style:dashed !important;
        color:#B96A1A !important;
        background:#FFF7ED !important;
        cursor:not-allowed !important;
      }
      .composer.composer-compact .engine-status {
        flex: 1 1 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 2px;
        padding: 8px 10px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 10px;
        background: #F8FAFD;
        color: #8A95A8;
        font-size: 12px;
        line-height: 1.4;
      }
      .composer.composer-compact .engine-status.ready span { color: #1B9A4A; }
      .composer.composer-compact .engine-status.missing span { color: #B96A1A; }
      .composer.composer-compact .engine-status a {
        flex-shrink: 0;
        color: #007AFF;
        font-weight: 700;
        text-decoration: none;
      }
      .composer.composer-compact .engine-status a:hover { color: #60a5fa; }
    </style>
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <script>
  (function(){
    var E=function(msg){var d=document.getElementById('__err');if(!d){d=document.createElement('div');d.id='__err';d.style.cssText='position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;z-index:999999;padding:12px 16px;font:13px/1.5 monospace;word-break:break-all;white-space:pre-wrap;';document.body.appendChild(d);}d.textContent+=msg+'\n';};
    window.addEventListener('error',function(e){E('JS ERROR: '+e.message+'\n  at '+e.filename+':'+e.lineno);});
    window.addEventListener('unhandledrejection',function(e){E('PROMISE REJECT: '+(e.reason&&e.reason.message?e.reason.message:String(e.reason)));});
  })();

<aside class="sidebar">

  <a href="/pages/settings.html" class="nav-item" title="设置">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

</aside>
    <main class="agent-page">
      <header class="agent-topbar">
        <div class="brand">
          <img src="/assets/image.png" alt="NextGen logo" />
          <div>
            <strong>NEXTGEN</strong>
            <span>Agent</span>
          </div>
        </div>
        <div class="top-actions">
          <button id="langToggleBtn" class="lang-btn">EN</button>
          <a class="back-link" href="/pages/index.html">返回首页</a>
        </div>
      </header>

      <section id="workspace" class="workspace mode-chat">
        <div class="workspace-toolbar" hidden>
          <button id="toggleScriptTab" class="workspace-tab">分镜脚本</button>
          <button id="toggleVideoTab" class="workspace-tab">视频编辑</button>
        </div>
        <aside id="scriptEditorPanel" class="editor-panel script-panel" hidden></aside>
        <section id="videoEditorPanel" class="editor-panel video-panel" hidden></section>

        <section class="chat-shell">
          <div id="chatList" class="chat-list"></div>
          <section id="taskQueuePanel" class="task-queue-panel" hidden>
            <div class="task-queue-head" id="taskQueueToggleRow">
              <div class="task-queue-head-left">
                <button id="taskQueueCollapseBtn" class="task-queue-collapse-btn" type="button" aria-expanded="true" aria-label="收起任务列表">▾</button>
                <div id="taskQueueTitle" class="task-queue-title">并发任务</div>
              </div>
              <button id="taskQueueClearBtn" class="task-queue-clear-btn" type="button">清理已完成</button>
            </div>
            <div id="taskQueueList" class="task-queue-list"></div>
          </section>

          <div class="composer composer-compact">
            <div class="compact-head">
              <button id="uploadBtn" class="ghost upload-ref-btn">参考图</button>
              <button id="toggleProductUrlBtn" class="ghost">商品链接</button>
              <button id="toggleHotVideoBtn" class="ghost">爆款视频</button>
              <button id="toggleFrameBtn" class="ghost">首尾帧</button>
              <span id="uploadHint" class="compact-hint" hidden></span>
            </div>
            <div class="frame-upload-panel" id="framePanel" hidden>
              <div class="frame-slot" id="firstFrameSlot">
                <div class="frame-label">首帧</div>
                <div class="frame-drop" id="firstFrameDrop">
                  <span>+</span><span>上传首帧</span>
                </div>
                <input id="firstFrameInput" type="file" accept="image/png,image/jpeg" hidden />
              </div>
              <div class="frame-slot" id="lastFrameSlot">
                <div class="frame-label">尾帧</div>
                <div class="frame-drop" id="lastFrameDrop">
                  <span>+</span><span>上传尾帧</span>
                </div>
                <input id="lastFrameInput" type="file" accept="image/png,image/jpeg" hidden />
              </div>
              <button id="aiGenerateFramesBtn" class="ghost" type="button">AI 自动生成</button>
            </div>
            <div class="compact-link-row">
              <input id="productUrlInput" type="url" placeholder="粘贴商品链接并解析" />
              <button id="parseProductUrlBtn" class="ghost">解析链接</button>
            </div>
            <p id="linkParseStatus" class="link-parse-status" hidden aria-live="polite"></p>
            <div class="compact-link-row hot-video-link-row">
              <input id="hotVideoUrlInput" type="text" placeholder="粘贴爆款视频链接并解析复刻" />
              <button id="parseHotVideoBtn" class="ghost">解析复刻</button>
              <button id="startHotVideoRemakeBtn" class="ghost" type="button" disabled>一键复刻</button>
            </div>
            <p id="hotVideoParseStatus" class="link-parse-status hot-video-status" hidden aria-live="polite"></p>
            <textarea id="chatInput" placeholder="输入视频生成提示词..." rows="3"></textarea>
            <div class="video-engine-wrap" aria-label="video model">
              <span class="video-engine-caption" id="videoEngineLabel">视频模型</span>
              <div class="video-engine-inline" role="tablist">
                <button type="button" class="engine-chip" data-video-engine="ltx" role="tab" title="LTX 2.3（ComfyUI）">LTX 2.3</button>
                <button type="button" class="engine-chip" data-video-engine="jimeng" role="tab" title="即梦 3.0">即梦 3.0</button>
                <button type="button" class="engine-chip active" data-video-engine="veo" role="tab" title="Veo 3.1 Fast">Veo 3.1</button>
                <button type="button" class="engine-chip" data-video-engine="grok" role="tab" title="Grok Video">Grok</button>
              </div>
              <div class="engine-status" id="videoEngineStatus">
                <span>当前模型：Veo 3.1 · 未配置 Key</span>
                <a href="/pages/settings.html#video-models">配置视频模型</a>
              </div>
            </div>
            <div class="compact-config-row">
              <label class="compact-chip" for="aspectRatioSelect">
                <span>比例</span>
                <select id="aspectRatioSelect" aria-label="Aspect ratio">
                  <option value="16:9">16:9</option>
                  <option value="9:16">9:16</option>
                  <option value="1:1">1:1</option>
                </select>
              </label>
              <label class="compact-chip" for="durationSelect">
                <span>视频时长</span>
                <select id="durationSelect"></select>
              </label>
              <button id="sendBtn">生成视频</button>
              <button id="enhancePromptBtn" class="ghost">提示词增强</button>
            </div>
            <p id="durationHint" class="duration-hint"></p>
            <input id="imageInput" type="file" accept="image/png,image/jpeg" multiple hidden />
          </div>
        </section>
      </section>
    </main>

    <!-- 回到底部 FAB -->
    <button id="scrollBotFab" class="scroll-bot-fab" aria-label="回到底部" hidden>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
      <span id="scrollBotBadge" class="scroll-bot-badge" hidden>0</span>
    </button>

    <!-- 参考图选择弹窗（复用 landing 结构）-->
    <section id="agentRefModal" class="ref-modal" aria-hidden="true">
      <div class="ref-modal-card">
        <header class="ref-modal-head">
          <strong data-i18n="refPanelTitle">选择参考图</strong>
          <button id="agentCloseRefPanelBtn" class="ref-close-btn" type="button" aria-label="Close">×</button>
        </header>
        <div class="ref-modal-body">
          <aside class="ref-modal-side">
            <button id="agentRefUploadBtn" class="ref-side-btn" type="button">
              <span class="side-icon upload" aria-hidden="true"></span>
              <span>从本地上传</span>
            </button>
            <input id="agentRefFileInput" type="file" accept="image/*" multiple hidden />
          </aside>
          <div class="ref-modal-main">
            <div class="ref-tabs">
              <button id="agentRefTabUpload" class="ref-tab is-active" type="button">上传资产</button>
              <button id="agentRefTabAi" class="ref-tab" type="button">AI 生成</button>
            </div>
            <div id="agentRefUploadPanel" class="ref-panel is-active">
              <div id="agentRefUploadGrid" class="ref-grid"></div>
            </div>
            <div id="agentRefAiPanel" class="ref-panel">
              <div class="ai-form-box">
                <p class="ai-form-hint">填写 1–3 项 · AI 自动优化提示词并生成图片</p>
                <div class="ai-form-fields">
                  <div class="ai-form-field">
                    <label class="ai-form-label" for="agentAiFieldRegion">模特地区</label>
                    <div class="ai-form-input-wrap">
                      <input id="agentAiFieldRegion" type="text" class="ai-form-input" placeholder="如：欧美、日本、东南亚…" />
                      <div class="ai-form-chips" data-field="agent-region">
                        <button type="button" class="ai-chip" data-value="欧美">欧美</button>
                        <button type="button" class="ai-chip" data-value="日本">日本</button>
                        <button type="button" class="ai-chip" data-value="东南亚">东南亚</button>
                        <button type="button" class="ai-chip" data-value="中东">中东</button>
                      </div>
                    </div>
                  </div>
                  <div class="ai-form-field">
                    <label class="ai-form-label" for="agentAiFieldCategory">主营品类</label>
                    <div class="ai-form-input-wrap">
                      <input id="agentAiFieldCategory" type="text" class="ai-form-input" placeholder="如：连衣裙、运动鞋、手提包…" />
                      <div class="ai-form-chips" data-field="agent-category">
                        <button type="button" class="ai-chip" data-value="连衣裙">连衣裙</button>
                        <button type="button" class="ai-chip" data-value="运动鞋">运动鞋</button>
                        <button type="button" class="ai-chip" data-value="手提包">手提包</button>
                        <button type="button" class="ai-chip" data-value="T恤">T恤</button>
                      </div>
                    </div>
                  </div>
                  <div class="ai-form-field">
                    <label class="ai-form-label" for="agentAiFieldStyle">风格</label>
                    <div class="ai-form-input-wrap">
                      <input id="agentAiFieldStyle" type="text" class="ai-form-input" placeholder="如：简约高级感、街头潮流、法式优雅…" />
                      <div class="ai-form-chips" data-field="agent-style">
                        <button type="button" class="ai-chip" data-value="简约高级感">高级感</button>
                        <button type="button" class="ai-chip" data-value="街头潮流">街头潮流</button>
                        <button type="button" class="ai-chip" data-value="法式优雅">法式优雅</button>
                        <button type="button" class="ai-chip" data-value="日系清新">日系清新</button>
                      </div>
                    </div>
                  </div>
                </div>
                <button id="agentRefAiGenerateBtn" class="ai-gen-submit-btn" type="button">
                  <span class="ai-gen-submit-icon">✦</span>
                  <span>AI 生成</span>
                </button>
              </div>
              <div id="agentRefAiResultGrid" class="ref-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="/scripts/entry/agent.main.js?v=20260603-model-sync"></script>
<script>
(function(){
  try {
    var t = JSON.parse(localStorage.getItem('nextgen_template'));
    if (t && t.prompt) {
      var input = document.getElementById('chatInput');
      if (input) input.value = t.prompt;
      localStorage.removeItem('nextgen_template');
    }
  } catch(e) {}
})();
</script>
  </body>
</html>
