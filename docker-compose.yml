# 九天云盒 Pro — docker-compose.yml
# 部署: docker-compose up -d
# 更新: docker-compose pull && docker-compose up -d

version: "3.8"

services:
  nextgen:
    image: registry.chinamobile.com/nextgen/nextgen:latest
    container_name: nextgen
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # 用户数据持久化（配置、生成图片、视频输出）
      - ./data:/data
      # 本地 .env 覆盖镜像内置的
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/pages/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.nextgen.version=1.0.0"
      - "com.nextgen.auto-update=true"
